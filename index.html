<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biochemie Prüfungssimulation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4ff;color:#111;min-height:100vh}
/* Home */
.home{max-width:600px;margin:0 auto;padding:3rem 1.5rem;text-align:center}
.home h1{font-size:1.75rem;font-weight:600;color:#1a1533;margin-bottom:.5rem}
.home p{color:#6b7280;margin-bottom:2.5rem;font-size:.95rem}
.cards{display:flex;flex-direction:column;gap:1rem}
.card{background:#fff;border:1.5px solid #e5e3f5;border-radius:14px;padding:1.4rem 1.6rem;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#534AB7;box-shadow:0 2px 16px rgba(83,74,183,.12)}
.card h2{font-size:1rem;font-weight:600;color:#1a1533;margin-bottom:.25rem}
.card p{font-size:.82rem;color:#6b7280}
.badge{display:inline-block;background:#eeedfb;color:#534AB7;font-size:.73rem;font-weight:600;padding:2px 9px;border-radius:20px;margin-bottom:.5rem}
/* Exam */
.exam-wrap{max-width:720px;margin:0 auto;padding:1.5rem}
.exam-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.75rem}
.back-btn{background:none;border:none;cursor:pointer;color:#534AB7;font-size:.88rem;padding:6px 0;display:flex;align-items:center;gap:4px}
.exam-title{font-size:1.2rem;font-weight:600;color:#1a1533}
.exam-sub{font-size:.8rem;color:#6b7280;margin-top:2px}
.question-block{background:#fff;border:1.5px solid #e5e3f5;border-radius:12px;padding:1.4rem;margin-bottom:1.25rem}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.9rem}
.q-num{font-size:.78rem;color:#6b7280;font-weight:500}
.q-pts{font-size:.75rem;background:#f3f4f6;color:#374151;padding:2px 9px;border-radius:20px}
.q-text{font-size:.9rem;line-height:1.6;color:#111;margin-bottom:1rem}
.options{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border:1.5px solid #e5e3f5;border-radius:8px;cursor:pointer;background:#fff;transition:background .1s,border-color .1s;user-select:none}
.opt:hover{background:#f8f7ff}
.opt.sel{background:#eeedfb;border-color:#534AB7}
.opt.cor{background:#eaf3de;border-color:#3b6d11}
.opt.wrg{background:#fcebeb;border-color:#a32d2d}
.opt.mis{background:#faeeda;border-color:#854f0b}
.opt-lbl{font-size:.78rem;font-weight:600;color:#6b7280;min-width:20px;padding-top:1px}
.opt.sel .opt-lbl{color:#534AB7}
.opt.cor .opt-lbl{color:#3b6d11}
.opt.wrg .opt-lbl{color:#a32d2d}
.opt.mis .opt-lbl{color:#854f0b}
.opt-txt{font-size:.85rem;line-height:1.5}
.q-result{margin-top:1rem;padding:12px 14px;background:#f9fafb;border-radius:8px;border:1px solid #e5e3f5}
.q-pts-result{font-size:.8rem;font-weight:600;margin-bottom:6px}
.q-explanation{font-size:.8rem;line-height:1.6;color:#374151}
.submit-bar{position:sticky;bottom:0;background:linear-gradient(transparent,#f5f4ff 40%);padding:1rem 0 1.5rem}
.submit-btn{width:100%;padding:13px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s}
.submit-btn:hover{background:#453db0}
.submit-btn:disabled{background:#9ca3af;cursor:default}
/* Results */
.results{max-width:720px;margin:0 auto;padding:1.5rem}
.score-card{background:#534AB7;color:#fff;border-radius:14px;padding:2rem;text-align:center;margin-bottom:1.5rem}
.score-big{font-size:3rem;font-weight:600;line-height:1}
.score-max{font-size:1rem;opacity:.75;margin-top:.3rem}
.score-pct{font-size:1.1rem;margin-top:.75rem;opacity:.9}
.score-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:1.25rem}
.stat{background:rgba(255,255,255,.15);border-radius:10px;padding:.75rem}
.stat-val{font-size:1.3rem;font-weight:600}
.stat-lbl{font-size:.72rem;opacity:.8;margin-top:2px}
.results-questions{margin-bottom:2rem}
.results-questions h2{font-size:1rem;font-weight:600;color:#1a1533;margin-bottom:1rem}
.q-result-summary{background:#fff;border:1.5px solid #e5e3f5;border-radius:12px;padding:1.2rem;margin-bottom:.75rem}
.qrs-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.qrs-num{font-size:.78rem;color:#6b7280}
.qrs-pts{font-size:.85rem;font-weight:600}
.qrs-pts.full{color:#3b6d11}
.qrs-pts.partial{color:#854f0b}
.qrs-pts.zero{color:#a32d2d}
.qrs-text{font-size:.85rem;line-height:1.5;margin-bottom:.75rem;color:#1a1533}
.qrs-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem}
.qrs-exp{font-size:.8rem;line-height:1.6;color:#374151;padding-top:.5rem;border-top:1px solid #f0f0f0}
.legend{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem}
.leg{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#374151}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.leg-cor{background:#eaf3de;border:1.5px solid #3b6d11}
.leg-wrg{background:#fcebeb;border:1.5px solid #a32d2d}
.leg-mis{background:#faeeda;border:1.5px solid #854f0b}
.restart-btn{width:100%;padding:13px;background:#fff;border:1.5px solid #534AB7;color:#534AB7;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;margin-bottom:1rem;transition:background .15s}
.restart-btn:hover{background:#f5f4ff}
</style>
</head>

<script>
var L="ABCDEFGH";

var EXAMS=[
{
title:"Beispielprüfung 1",
qs:[
{q:"Welche Basenpaarung findet man in komplementären RNA Strängen? Bitte kreuzen Sie die Richtigen an.",
o:["G-T","G-C","G-U","A-C","G-A","A-U","U-A","A-A"],
c:[1,5,6],
e:"In RNA gibt es kein Thymin (T), nur Uracil (U). Komplementäre Paarungen: G-C (Watson-Crick), A-U (Watson-Crick), G-U (Wobble-Paarung, kommt in RNA vor). U-A ist dieselbe Paarung wie A-U, nur umgekehrt geschrieben – ebenfalls korrekt."},
{q:"Welche Aussagen treffen auf den \"Warburg Effekt\" in Krebszellen zu? Bitte kreuzen Sie die richtigen Antworten an.",
o:["Krebszellen haben durch den \"Warburg Effekt\" einen Nachteil, sie können weniger Membranen machen.","Tumore haben einen Vorteil bei Hypoxie, da sie keine neuen Blutgefäße bilden können.","Krebszellen haben durch den \"Warburg Effekt\" einen Vorteil, da sie mehr Membranen machen können.","Der „Warburg Effekt\" findet in der Zellmembran statt und dabei wird viel ATP gebildet.","Tumore haben einen Vorteil bei Hypoxie, da sie neue Blutgefäße bilden können.","Der „Warburg Effekt\" wird auch anaerobe Glykolyse genannt und Krebszellen überleben damit besser eine hypoxische Situation.","Der „Warburg Effekt\" findet im Zytoplasma statt und Zellen erzeugen dabei weniger ATP als bei der oxidativen Phosphorylierung.","Der „Warburg Effekt\" ist nach seinem Entdecker, dem Biochemiker Otto Warburg benannt."],
c:[2,4,5,6,7],
e:"Der Warburg-Effekt findet im Zytoplasma statt (G). Krebszellen profitieren: mehr Membranen durch Biosynthese (C), neue Blutgefäße/Angiogenese (E), anaerobe Glykolyse = besser bei Hypoxie (F), weniger ATP als oxidative Phosphorylierung (G), benannt nach Otto Warburg (H). Findet NICHT in der Zellmembran statt (D falsch). A ist falsch — Warburg ermöglicht MEHR Biosynthese, nicht weniger."},
{q:"Welche Aussagen zu Stoffwechselvorgängen sind korrekt? Bitte kreuzen Sie die Richtigen an.",
o:["Methylierung von Proteinen gehört auch zu Stoffwechselvorgängen.","Die meisten Prozesse des Aminosäurestoffwechsel unterliegen Diffusionsvorgängen.","Bereitstellung von Bausteinen oder Verbrauch dieser Bausteine sind wesentliche Aspekte von metabolischen Prozessen.","Metabolische Prozesse steuern auch den Zelltod.","Metabolische Prozesse steuern die zelluläre Proliferation und Zellzyklus Progression.","Stoffwechselvorgänge finden zufällig statt.","Die meisten Stoffwechselvorgänge sind reguliert.","Die meisten Stoffwechselvorgänge sind abhängig von der Enzymaktivität."],
c:[0,2,3,4,6,7],
e:"Metabolismus umfasst: Methylierung als PTM (A), Bereitstellung und Verbrauch von Bausteinen z.B. Aminosäuren, Fettsäuren (C), Steuerung des Zelltods/Apoptose (D), und die meisten Vorgänge sind reguliert (G). Stoffwechsel ist nicht zufällig (F falsch)."},
{q:"Welche Aminosäuren sind negativ geladen? Bitte kreuzen Sie die Richtigen an.",
o:["Alanin","Histidin","Glycin","Asparagin","Prolin","Asparaginsäure","Glutaminsäure","Lysin"],
c:[5,6],
e:"Negativ geladene Aminosäuren (saure AS): Asparaginsäure/Aspartat (F) und Glutaminsäure/Glutamat (G) – beide tragen eine negative Ladung bei physiologischem pH. Lysin (H) und Histidin (B) sind positiv geladen. Alanin, Glycin, Asparagin, Prolin sind neutral."},
{q:"Aminosäurekatabolismus kann den Krebszyklus antreiben. Welche der folgenden Aussagen ist wahr? Bitte kreuzen Sie die richtigen an.",
o:["Der letzte Schritt des Aminosäurekatabolismus ist die Peptidkettenbildung.","S-Adenosylmethionin (SAM) ist ein wichtiger Methyldonor und Zwischenprodukt des Methioninabbaus.","Meistens ist der erste Schritt des Aminosäurekatabolismus, die Entfernung von Stickstoff durch Desaminierung.","Autophagie ist ein Selbstverdauungsprozess von Zellen, welche nur begrenzt mit Nährstoffen versorgt werden. Dabei wird durch den Katabolismus von Proteinen zu Aminosäuren der TCA-Zyklus in Zeiten nieddriger Energie angetrieben.","S-Adenosylmethionin (SAM) ist eine langkettige Proteinstruktur.","Der erste Schritt des Aminosäurekatabolismus ist die Entfernung von Schwefelatomen unter Wassererzeugung.","Aminosäuren werden niemals in Pyruvat umgewandelt und gelangen auch nicht in den TCA-Zyklus.","Alle Aminosäuren müssen vor Eintritt in den TCA-Zyklus in Pyruvat umgewandelt werden."],
c:[1,2,3],
e:"SAM ist Methyldonor aus Methioninabbau (B). Erster Schritt = Desaminierung/Transaminierung zur N-Entfernung (C). Autophagie liefert AS für den TCA-Zyklus bei Energiemangel (D). Aminosäuren können auch direkt als Oxalacetat, α-Ketoglutarat etc. eintreten, nicht nur als Pyruvat (H falsch)."},
{q:"Für was ist Polyubiquitinierung wichtig und an welcher Aminosäure findet sie statt? Bitte kreuzen Sie richtiges an.",
o:["Polyubiquitinierung findet an Guanin statt.","Polyubiquitinierung findet nur an Doppelbindungen in ungesättigten Fettsäuren statt.","Für den Abbau von DNA.","Polyubiquitinierung findet an einem Histidin statt.","Polyubiquitinierung findet an einem Lysin statt.","Für den Abbau von Fettsäuren.","Polyubiquitinierung findet an Cytosin statt.","Für den Abbau von Proteinen."],
c:[4,7],
e:"Polyubiquitinierung: Ubiquitin-Ketten werden an Lysin-Reste von Proteinen angehängt (E). Dies markiert Proteine für den proteasomalen Abbau (H). Guanin und Cytosin sind Nucleobasen (A, G falsch). Fettsäuren werden durch β-Oxidation, nicht Ubiquitinierung, abgebaut (F falsch)."},
{q:"Was stellen die RNA Polymerasen her und welche Aussagen zu RNA Polymerasen ist richtig? Bitte kreuzen Sie die richtigen Antworten an.",
o:["RNA Polymerasen sind total unwichtig","Bereitstellung von Aminosäuren für Proteinsynthese","Herstellung langkettiger Polypeptide","RNA Polymerasen sind essentiell und es gibt im Menschen 3 verschiedene","Synthese von mRNA","Synthese von rRNA","Synthese und Katalyse von Ribozymen","Synthese von tRNA"],
c:[3,4,5,7],
e:"Beim Menschen gibt es 3 RNA-Polymerasen (D): Pol I → rRNA (F), Pol II → mRNA (E), Pol III → tRNA (H). RNA-Polymerasen sind essentiell (D). Aminosäuren und Polypeptide werden nicht von RNA-Polymerasen hergestellt (B, C falsch)."},
{q:"Wodurch ist Typ 1 Diabetes (T1D) oder Typ 2 Diabetes (T2D) gekennzeichnet? Was kann man dagegen unternehmen? Hat hier Bewegung und richtige Ernährung einen positiven Einfluss oder ist das egal? Bitte kreuzen Sie die richtigen Antworten an.",
o:["T1D ist eine Autoimmunerkrankung wodurch die Insulin produzierenden Bauchspeicheldrüsenzellen (Langerhanszellen) getötet werden.","T2D verursacht Probleme im Zuckerstoffwechsel und diese Regulation ist lebenswichtig.","T2D korreliert nicht mit Fettleibigkeit, aber es ist eine Autoimmunerkrankung und es gibt kein Medikament dagegen.","Sport und Ausdauerbewegung wirkt T2D positiv entgegen.","T2D ist durch Insulinresistenz gekennzeichnet.","Gesunde Ernährung, z.B. mehr Obst und Gemüse, oder fibröse Nahrung wirken T2D positiv entgegen.","T2D ist eine Autoimmunerkrankung wodurch die Insulin produzierenden Bauchspeicheldrüsenzellen (Langerhanszellen) getötet werden.","T2D korreliert mit Fettleibigkeit und es muss künstlich Insulin medikamentös verabreicht werden."],
c:[0,1,3,4,5],
e:"T1D = Autoimmunerkrankung, Beta-Zellen werden zerstört (A). T2D = Insulinresistenz, gestörter Zuckerstoffwechsel (B, E). Sport (D) und Ernährung (F) wirken positiv auf T2D. T2D ist keine Autoimmunerkrankung (G falsch). T2D braucht nicht zwingend Insulin (H falsch – oft ausreichend durch Lebensstil und Medikamente)."},
{q:"Welche Aussagen treffen auf das Ribosom zu? Bitte kreuzen Sie die Richtigen an.",
o:["Das Ribosom besteht aus einzelnen Nukleotiden und Metaboliten.","Die Synthese der RNA beginnt beim C-Terminus und endet beim N-Terminus.","Die primäre Funktion des Ribosoms ist die Proteinbiosynthese.","Das Ribosom besteht aus Proteinen und RNA.","Die Synthese der Proteine beginnt beim N-Terminus und endet beim C-Terminus.","Die Synthese der RNA beginnt beim N-Terminus und endet beim C-Terminus.","Die Synthese der Proteine beginnt beim C-Terminus und endet beim N-Terminus.","Die primäre Funktion des Ribosoms ist das Umwandeln der genetischen Information von DNA zu RNA."],
c:[2,3,4],
e:"Ribosomen bestehen aus rRNA und Proteinen (D) und sind die Maschine der Proteinbiosynthese (C). Proteine werden vom N-Terminus zum C-Terminus synthetisiert (E). Ribosomen wandeln keine DNA in RNA um – das macht RNA-Polymerase (H falsch). Nukleotide/Metaboliten (A falsch)."},
{q:"Der genetische Code ist die Grundlage der Proteinsynthese in lebenden Organismen. Welche der folgenden Aussagen beschreibt den genetischen Code korrekt? Bitte kreuzen Sie das Richtige an.",
o:["Der genetische Code ist degeneriert, d. h. mehrere Codons können für dieselbe Aminosäure codieren.","Ein Codon besteht aus vier Nukleotiden und kodiert für eine Aminosäure.","Es gibt insgesamt 64 verschiedene Codons.","Stopcodons kodieren für die Aminosäure Methionin.","Ein Codon besteht aus zwei Nukleotiden und kodiert für eine Aminosäure.","Es gibt insgesamt 20 verschiedene Codons.","Ein Codon besteht aus drei Nukleotiden und kodiert für eine Aminosäure.","Startcodons signalisieren das Ende der Translation."],
c:[0,2,6],
e:"Der genetische Code ist degeneriert (A) – z.B. codieren 6 Codons für Leucin. 64 Codons insgesamt (C): 4³ = 64. Jedes Codon = 3 Nukleotide (G – Triplett-Code). Stopcodons = UAA, UAG, UGA – sie codieren nicht für Aminosäuren (D falsch). Startcodon = Beginn der Translation (H falsch)."},
{q:"Was sind wesentliche Funktionen von Lipiden im menschlichen Körper? Bitte kreuzen Sie die Richtigen an.",
o:["Speichern von genetischer Information in DNA","Thermischer Schutz","Mechanischer Schutz","Fettsäuren verursachen Instabilität von Membranen","Bereitstellung von Energie","Beschleunigung von Transportprozessen des Zytoskelettes","Verbrauch von Sauerstoffradikalen","Wichtiger Bestandteil von Membranen"],
c:[1,2,4,7],
e:"Lipide: thermischer Schutz durch Fettgewebe (B), mechanischer Schutz z.B. Nieren (C), Energiespeicher (Triacylglyceride) (E), und Phospholipide sind essentielle Membranbestandteile (H). DNA speichert genetische Information (A falsch). Fettsäuren sind wichtig für Membranstabilität, destabilisieren nicht (D falsch)."},
{q:"Welche Aussagen zu weißen beziehungsweise braunen Fettzellen sind wahr? Bitte kreuzen Sie die Richtigen an.",
o:["Beide Zellarten entstammen aus der mesenchymalen Linie, ähnlich wie Muskelzellen.","Braune Fettzellen sind essenziell für die Thermoregulation in Säugern.","Fetttropfen in weißen Fettzellen sind vor Lipasen und dem Katabolismus von langkettigen Fettsäuren mit einem Hüllprotein geschützt, dass Perilipin heißt.","Mitochondriale Funktion von braunen Fettzellen ist wichtig um Wärme zu erzeugen.","Braune Fettzellen können nur Aminosäuren und keine Fettsäuren aufnehmen, denn sie machen immer Autophagie.","Nur weiße Fettzellen können viele Fettsäuren freisetzen.","Weiße Fettzellen können langkettige Fettsäuren in großen Fetttropfen speichern.","Beide Zellarten generieren im Wesentlichen Hitze."],
c:[0,1,2,3,6],
e:"Beide Zelltypen aus mesenchymalen Stammzellen (A). Braune Fettzellen = Thermoregulation via UCP1 in Mitochondrien (B, D). Weiße Fettzellen: Fetttropfen mit Perilipin-Schutzmantel (C), speichern langkettige Fettsäuren (G). Braune Fettzellen können auch Fettsäuren aufnehmen (E falsch). Nur braune erzeugen hauptsächlich Hitze (H falsch)."},
{q:"Wie kommen Metabolite wie Fette, Aminosäuren, Zwischenprodukte, etc. in Zellen oder auch in Mitochondrien hinein beziehungsweise wieder heraus? Bitte kreuzen Sie die richtigen Antworten an.",
o:["Große Metabolite diffundieren zufällig in Zellen hinein oder hinaus.","Für die Aufnahme oder Sekretion von Metaboliten werden keine Zellmembranen durchquert.","Metabolite werden über Transporter Proteine die einen Kanal bilden in Zellen hinein oder hinaus transportiert.","Für die Aufnahme oder Sekretion von Metaboliten in Mitochondrien werden keine mitochondrialen Membranen durchquert.","Metabolite werden über Transporter Proteine die einen Kanal bilden in Mitochondrien hinein oder hinaus transportiert.","Für die Aufnahme oder Sekretion von Metaboliten werden Zellmembranen durchquert.","Für die Aufnahme oder Sekretion von Metaboliten in Mitochondrien werden mitochondriale Membranen durchquert.","Große Metabolite diffundieren zufällig in Mitochondrien hinein oder hinaus."],
c:[2,4,5,6],
e:"Metabolite brauchen Transporterproteine (Carrier, Kanäle) für den Membrantransport (C, E). Membranen werden dabei durchquert – Zellmembranen (F) und mitochondriale Membranen (G). Große Metabolite diffundieren nicht zufällig – dafür sind spezifische Transporter nötig (A, H falsch)."},
{q:"Wie wird der Prozess genannt, bei dem Glukose abgebaut wird und ATP generiert wird? Bitte kreuzen Sie den Richtigen an.",
o:["Beta-oxidation","Photosynthese","Fermentation","Proteolyse","Glukoneogenese","Transkription","Translation","Glykolyse"],
c:[7],
e:"Glykolyse (H) = Abbau von Glukose zu Pyruvat unter Gewinnung von ATP und NADH. Beta-Oxidation baut Fettsäuren ab (A). Photosynthese = Aufbau von Zucker aus CO₂ (B). Fermentation = anaerobes Weiterverwerten von Pyruvat (C). Glukoneogenese = Synthese von Glukose (E)."},
{q:"Welche Aussagen über Kinasen sind wahr? Bitte kreuzen Sie die Richtigen an.",
o:["Kinasen haben die entgegengesetzte Funktion von Phosphatasen.","Kinasen sind Proteine, welche die Aktivierung oder Inaktivierung von anderen Proteinen steuern können.","Kinasen sind Enzyme, die eine post-translationale Modifikation (PTM) an Proteinen durchführen können.","Kinasen haben keine Funktion in der Zelle, sie wirken nur außerhalb der Zellmembran.","Kinasen sind Proteine die ATP als Energiequelle verwenden.","Kinasen sind Proteine, die Phosphorylierungen durchführen können.","Kinasen sind wichtige Chaperone, die bei der Proteinfaltung eine wichtige Rolle spielen.","Kinasen sind Proteine, die Phosphatgruppen abspalten."],
c:[0,1,2,4,5],
e:"Kinasen: addieren Phosphatgruppen (Phosphorylierung) (E, F) – Gegenteil von Phosphatasen (A). PTM durch Phosphorylierung (C), dadurch Aktivierung oder Inaktivierung von Proteinen möglich (B). ATP ist der Phosphatdonor (D enthält ATP). Kinasen sind keine Chaperone (G falsch). Phosphatasen, nicht Kinasen, spalten Phosphatgruppen ab (H falsch)."},
{q:"Welche Aussagen bezüglich der β-Oxidation sind wahr? Bitte kreuzen Sie die Richtigen an.",
o:["Die β-Oxidation findet ausschließlich in Zellen der Leber und der Muskeln statt.","Für die β-Oxidation sind verschiedene Antioxidantien essenziell.","Die β-Oxidation findet ausschließlich in Zellen des kognitiven Nervensystems statt.","Bei der β-Oxidation entsteht als kleinster Baustoff Glukose, welche wichtig für die Energiegewinnung ist.","Die β-Oxidation findet in den Mitochondrien statt.","Für die β-Oxidation sind verschiedene Enzyme wichtig.","Die β-Oxidation findet im Cytoplasma statt.","Bei der β-Oxidation entsteht Acetyl-CoA, welches wichtig für die Energiegewinnung ist."],
c:[4,5,7],
e:"β-Oxidation findet in Mitochondrien statt (E), braucht mehrere Enzyme (F) und produziert Acetyl-CoA → TCA-Zyklus (H). Nicht nur Leber/Muskeln – auch Herz, Niere etc. (A falsch). Antioxidantien nicht essentiell dafür (B falsch). Endprodukt ist Acetyl-CoA, nicht Glukose (D falsch)."},
{q:"Wo findet der Citratzyklus (Krebszyklus) in Eukaryonten statt und wofür wird er benötigt? Bitte kreuzen Sie die richtigen Antworten an.",
o:["Der Citratcyclus findet im Cytoplasma statt.","Der Citratcyclus findet im Zellkern statt.","Der Citratcyclus findet im Golgi Apparat statt.","Der Citratcyclus findet in Liposomen statt.","Der Citratcyclus findet in Mitochondrien statt.","Der Citratcyclus findet im Endoplasmatischen Retikulum statt.","Der Citratcyclus verbraucht im Wesentlichen Energie in Form von ATP.","Der Citratcyclus wird für die Herstellung von Energie benötigt, z.B. ATP."],
c:[4,7],
e:"Citratzyklus findet in der Mitochondrienmatrix statt (E) und liefert Energie durch Reduktion von NAD⁺ zu NADH und FAD zu FADH₂ → später ATP durch Atmungskette (H). Er verbraucht keine ATP, er produziert Energieäquivalente (G falsch)."},
{q:"Wie werden die drei Phasen der Translation genannt? Bitte kreuzen Sie die Richtigen an.",
o:["Prophase","Hybridisierung","Termination","Anaphase","Annealing","Initiation","Elongation","Denaturierung"],
c:[2,5,6],
e:"Die drei Phasen der Translation: Initiation (F) = Zusammenbau am Startcodon, Elongation (G) = Kettenverlängerung am Ribosom, Termination (C) = Stopp am Stoppcodon, Freisetzung der Polypeptidkette. Prophase und Anaphase (A, D) sind Mitosephasen."},
{q:"Welche Aussagen zu Diabetes sind wahr? Bitte kreuzen Sie die richtigen Antworten an.",
o:["Erhöhte Lipolyse ist ein Kennzeichen von Diät und verursacht eine Prädisposition zu Diabetes.","Diabetes ist sehr eng mit Entzündungsprozessen der Haut verknüpft.","Typ 2 Diabetes und Fettleibigkeit sind mit einem höheren Krebsrisiko für bestimmte Krebsarten wie Darmkrebs, Magenkrebs oder auch Brustkrebs, Prostatakrebs assoziiert.","Nur wenn die Bauchspeicheldrüse eine genetische Prädisposition hat kann Diabetes entstehen.","Eine Blutarmut ist durch niedrigere Erythropoietin Mengen gekennzeichnet und dies ist eng mit Diabetes Typ 2 assoziiert.","Fettleibigkeit führt zu einem erhöhten Sexualhormon Spiegel, da durch die Überernährung, erhöhte Mengen von Cholesterol aufgenommen und gespeichert werden.","Typ 1 Diabetes ist eine Autoimmunerkrankung, die durch eine Immunzell-vermittelte Lyse der Insulin-produzierenden Beta Zellen verursacht wird.","Betroffene mit Diabetes haben erhöhte Blutzuckerwerte."],
c:[2,6,7],
e:"T2D + Fettleibigkeit = erhöhtes Krebsrisiko (C). Fettleibigkeit → erhöhte Östrogen-/Androgensynthese aus Cholesterol (F). T1D = Autoimmun, Zerstörung der Beta-Zellen (G). Alle Diabetiker haben erhöhte Blutzuckerwerte (Hyperglykämie) (H)."},
{q:"Welche Krankheiten können mit Fettleibigkeit assoziiert werden? Bitte kreuzen Sie die richtigen Antworten an.",
o:["Metabolisches Syndrom","Schlaganfall","Typ-2-Diabetes","Typ-1-Diabetes","Haarausfall","Herzinfarkt","Chronische Entzündung","Chronische Angst"],
c:[0,1,2,5,6],
e:"Fettleibigkeit assoziiert mit: Metabolisches Syndrom (A), Schlaganfall durch Arteriosklerose (B), T2D durch Insulinresistenz (C), Herzinfarkt (F), chronische Entzündung durch Adipokine (G). T1D ist eine Autoimmunerkrankung, kein direkter Zusammenhang mit Fettleibigkeit (D)."}
]

{
title:"Beispielprüfung 2",
qs:[
{q:"Von welchen der unten angeführten Substanzen nehmen Veganer meist weniger zu sich, aufgrund ihrer veganen Ernährung? Beziehungsweise, welche der unten Substanzen sollten Veganer substituieren oder darauf achten pflanzliche Lebensmittel zu sich zu nehmen mit einem besonders hohen Anteil an diesen Substanzen, da sie nicht vom Körper selbst synthetisiert werden können? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Eisen","Langkettige Kohlenhydrate wie Stärke","Vitamin C","Vitamin B12","Vitamin D","Ein Mangel an Aminosäuren tritt immer auf, wenn kein Fleisch verzehrt wird.","Fettsäuren","Kupfer"],
c:[0,3,4],
e:"Veganer riskieren Mangel an: Eisen (A, pflanzliches Eisen schlechter bioverfügbar), Vitamin B12 (D, nur in tierischen Produkten, kann vom Körper nicht synthetisiert werden), Vitamin D (E, hauptsächlich tierische Quellen + Sonnenlicht). Vitamin C ist in Pflanzen reichlich (C falsch). Aminosäuremangel nur bei schlechter Planung (F falsch)."},
{q:"Was sind Vorteile des „Warburg-Effekts\" und wo findet er statt? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Der „Warburg-Effekt\" findet in den Mitochondrien statt.","Der „Warburg-Effekt\" beschreibt den Wechsel von aerober zu anaerober Glykolyse, bei dem die ATP-Produktion von den Mitochondrien in das Zytoplasma mit niedriger ATP-Ausbeute verlagert wird.","Lactat kann über größere Entfernungen wirken und wird durch MCT-Transporter transportiert oder aufgenommen.","Der Zellzyklus beschleunigt sich immer bei anaerober Glykolyse, auch unter Hypoxie.","Vorteile bestehen z. B. in Tumoren für die Bildung neuer Blutgefäße.","Es ist ein Vorteil, dass durch die Lactatsekretion keine neuen Blutgefäße gebildet werden.","Durch die Lactatproduktion kann eine größere Menge an Zellmembranen hergestellt werden, wodurch Zellen widerstandsfähiger gegen toxische Substanzen oder Angriffe des Immunsystems werden.","Der „Warburg-Effekt\" findet im endoplasmatischen Retikulum statt und bildet die Hauptenergiequelle der Zelle."],
c:[1,2,4,6],
e:"Warburg-Effekt = Verlagerung der ATP-Produktion von Mitochondrien ins Zytoplasma (anaerobe Glykolyse) (B). Lactat = parakriner Signalbote via MCT-Transporter (C). Vorteil: Neovaskularisation in Tumoren (E). Lactat → Fettsäuresynthese → mehr Membranen (G). Findet im Zytoplasma statt, nicht Mitochondrien (A, H falsch)."},
{q:"Welche der folgenden Aussagen beschreiben korrekt die Ebenen der Proteinstruktur (Primär-, Sekundär-, Tertiär- und Quartärstruktur)? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Die Quartärstruktur umfasst die Zusammensetzung mehrerer Polypeptid-Untereinheiten zu einem funktionellen Protein.","Alle Proteine haben per Definition der AlphaFold-Vorhersage eine Quartärstruktur.","Disulfidbrücken können zur Stabilität der Tertiärstruktur eines Proteins beitragen.","Die Tertiärstruktur beschreibt die dreidimensionale Form einer einzelnen Polypeptidkette.","Wasserstoffbrücken stabilisieren sowohl Alpha-Helices als auch Beta-Faltblätter in der Sekundärstruktur.","Disulfidbrücken kommen am häufigsten in der Quartärstruktur von Proteinkomplexen vor.","Die Primärstruktur eines Proteins ist die lineare Sequenz der Aminosäuren.","Die Primärstruktur bildet sich aufgrund von Wasserstoff- und Van-der-Waals-Bindungen zwischen Aminosäuren."],
c:[0,2,3,4,6],
e:"Quartärstruktur = mehrere Untereinheiten (A). Disulfidbrücken stabilisieren Tertiärstruktur (C). Tertiärstruktur = 3D-Faltung einer Polypeptidkette (D). H-Brücken in Alpha-Helix und Beta-Faltblatt = Sekundärstruktur (E). Primärstruktur = AS-Sequenz durch Peptidbindungen (G). Nicht alle Proteine haben Quartärstruktur (B falsch). Primärstruktur = Peptidbindungen, nicht H-Brücken (H falsch)."},
{q:"Welche der folgenden Nukleinbasen sind Purine? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Guanin","Thymin","Uracil","Rabulin","Cytidin","Adenin","Cytosin","Adenosin"],
c:[0,5],
e:"Purine (Doppelring-Struktur): Adenin (F) und Guanin (A). Pyrimidine (Einzelring): Thymin (B), Uracil (C), Cytosin (G). Rabulin (D) existiert nicht. Cytidin (E) und Adenosin (H) sind Nukleotidbausteine (Base + Zucker), keine freien Basen."},
{q:"Um Stoffwechselprozesse in Zellen zu messen, benötigen Sie analytische Geräte oder Methoden. Welche Geräte eignen sich dazu? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Gefrierschrank","Massenspektrometer","Gaschromatographie","Bunsenbrenner","Messgerät zur Bestimmung von ATP","Analysegerät zur Messung des Sauerstoffverbrauchs beziehungsweise der CO₂-Produktion (z. B. ein Seahorse-Gerät)","Metabolische Kammer zur Messung der Sauerstoffverbrauchsraten","Analysegerät zur Gewichtsbestimmung, z. B. eine Präzisionswaage"],
c:[1,2,4,5,6],
e:"Für Stoffwechselmessungen: Massenspektrometer = Metabolitenidentifikation (B), Gaschromatographie = Metabolitenanalyse (C), ATP-Messgerät = Luziferase-Assay (E), Seahorse-Gerät = O₂-Verbrauch/CO₂-Produktion = mitochondriale Funktion (F), metabolische Kammer = Sauerstoffverbrauchsraten (G). Gefrierschrank und Bunsenbrenner sind kein Analysegerät (A, D falsch)."},
{q:"Welche biochemischen Prozesse beinhalten die Synthese großer Moleküle aus kleineren Bausteinen? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Aneuplorismus","Katabolismus","Anabolismus","Katharsis","Glykolyse","Synthese langkettiger Fettsäuren","Glykogenese","Laktogenese"],
c:[2,5,6],
e:"Anabolismus (C) = Aufbau großer Moleküle aus kleineren (z.B. Proteinsynthese, Fettsäuresynthese, Glykogensynthese). Synthese langkettiger Fettsäuren (F) und Glykogenese/Glykogensynthese (G) sind anabole Prozesse. Katabolismus = Abbau (B). Glykolyse = Abbau von Glukose (D). Laktogenese = Milchproduktion, kein Syntheseprozess im gleichen Sinne (H)."},
{q:"Welche Aminosäuren enthalten ein, zwei oder drei Schwefelatome? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Methionin enthält ein Schwefelatom.","Tyrosin enthält drei Schwefelatome.","Isoleucin enthält ein Schwefelatom.","Valin enthält drei Schwefelatome.","Prolin enthält zwei Schwefelatome.","Lysin enthält drei Schwefelatome.","Cystein enthält ein Schwefelatom.","Alanin enthält ein Schwefelatom."],
c:[0,6],
e:"Schwefelhaltige Aminosäuren: Methionin (A) mit einer Thioether-Gruppe (-S-) und Cystein (G) mit einer Thiol-Gruppe (-SH), beide enthalten genau ein Schwefelatom. Tyrosin, Isoleucin, Valin, Prolin, Lysin, Alanin enthalten kein Schwefel."},
{q:"Warum verwenden wir in der Medizin Insulin bei bestimmten Krankheiten und wie heißen diese Krankheiten? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Insulin kann Depressionen entgegenwirken.","Covid 19","Insulin erhöht den Blutdruck bei Patienten mit Herzinfarktrisiko.","Typ-1-Diabetes","Typ-2-Diabetes","Blutkrebs","Insulin reguliert den Blutzuckerspiegel.","Insulin wird für die Biosynthese von Katecholaminen benötigt."],
c:[3,4,6],
e:"Insulin wird bei T1D (D) und fortgeschrittenem T2D (E) eingesetzt, da es den Blutzuckerspiegel senkt (G). Bei T1D fehlt Insulin komplett. Bei T2D kann exogenes Insulin nötig sein wenn orale Medikamente nicht ausreichen. Insulin hat keine Rolle bei Depressionen (A) oder Blutdruck (C)."},
{q:"Welche der folgenden Prozesse werden durch den Stoffwechsel reguliert? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Bindung von miRNA an eine Ziel-mRNA (target mRNA).","Proliferation und Überleben von Zellen.","Bindung einer regulatorischen long-non-coding RNA an eine Ziel-mRNA (target mRNA).","Proteasomaler Abbau von Proteinen.","Mutagenese der DNA durch Gammastrahlung.","Mutagenese der DNA durch UV-Bestrahlung.","Epigenetische Regulation der Gen-Transkription.","Phosphorylierung von Proteinen."],
c:[0,1,2,3,6,7],
e:"Metabolisch reguliert: Proliferation und Überleben (B, z.B. durch mTOR, Wachstumsfaktoren), proteasomaler Abbau von Proteinen durch Ubiquitin-System (D), epigenetische Regulation durch Methylierung/Acetylierung (G), Phosphorylierung durch Kinasen (H). Mutagenese durch Strahlung ist physikalisch/chemisch, nicht metabolisch (E, F)."},
{q:"Was ist ein Disaccharid? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Maltose","Glukose","Galaktose","Fruktose","Saccharose","Pentose","Laktose","Trehalose"],
c:[0,4,6,7],
e:"Disaccharide (2 Monosaccharide): Maltose = Glukose+Glukose (A), Saccharose = Glukose+Fruktose (E), Laktose = Glukose+Galaktose (G), Trehalose = Glukose+Glukose (H). Glukose, Galaktose, Fruktose (B, C, D) sind Monosaccharide. Pentose ist eine 5-Kohlenstoff-Monosaccharidgruppe."},
{q:"Was sind korrekte Unterschiede und Fakten zu essentiellen versus nicht-essentiellen Aminosäuren? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
o:["Tryptophan ist eine essentielle Aminosäure.","Die Syntheseschritte nicht-essentieller Aminosäuren sind im Vergleich zu essentiellen Aminosäuren komplexer.","Essentielle Aminosäuren müssen nicht mit der Nahrung aufgenommen werden.","Die Syntheseschritte nicht-essentieller Aminosäuren sind im Vergleich zu essentiellen Aminosäuren weniger komplex.","Essentielle Aminosäuren müssen mit der Nahrung aufgenommen werden.","Nicht-essentielle Aminosäuren können vom Menschen nicht synthetisiert werden.","Nicht-essentielle Aminosäuren können vom Menschen synthetisiert werden.","Tryptophan ist eine nicht-essentielle Aminosäure."],
c:[0,3,4,6],
e:"Tryptophan ist essentiell (A). Essentielle AS müssen mit der Nahrung aufgenommen werden, da der Körper sie nicht synthetisieren kann (E). Nicht-essentielle AS kann der Körper selbst herstellen (G). Die Synthesewege nicht-essentieller AS sind weniger komplex als die Gewinnung der essentiellen (D). 9 essentielle AS beim Menschen."},
{q:"Gibt es unter Berücksichtigung des humanen Metabolismus Gründe, warum man sich bei viralen oder bakteriellen Infektionen um die Ernährung kümmern sollte oder nicht? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Glukose kann während einer viralen Infektion eine positive Wirkung auf den Patienten haben.","Glukose kann während einer viralen Infektion eine negative Wirkung auf den Patienten haben.","Ketonkörper können während einer viralen Infektion eine negative Wirkung auf den Patienten haben.","Glukose kann während einer bakteriellen Infektion eine negative Wirkung auf den Patienten haben.","Glukose kann während einer bakteriellen Infektion eine positive Wirkung auf den Patienten haben.","Ketonkörper können während einer viralen Infektion eine positive Wirkung auf den Patienten haben.","Ketonkörper können während einer bakteriellen Infektion eine negative Wirkung auf den Patienten haben.","Ketonkörper können während einer bakteriellen Infektion eine positive Wirkung auf den Patienten haben."],
c:[1,4,5],
e:"Viren nutzen Glukose für ihre Replikation → hohe Glukose kann viral nachteilig sein (B). Bakterien konkurrieren mit dem Wirt um Glukose → hohe Glukose kann bakteriell nachteilig sein (D). Ketonkörper haben antimikrobielle/antivirale Eigenschaften und können positiv auf Infektionen wirken (E, H). Manche Forschungen zeigen, dass ketogene Ernährung bei Infektionen helfen kann."},
{q:"Welche der folgenden Aussagen beschreiben den genetischen Code korrekt? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Das START-Codon für die Translation ist typischerweise ATG in der DNA und AUG in der mRNA, welches für Cystein codiert.","Alle Aminosäuren werden durch genau ein bestimmtes Codon für die Translation codiert.","Das START-Codon für die Translation ist typischerweise ATG in der DNA und AUG in der mRNA, welches für Methionin codiert.","Mutationen in der DNA-Sequenz können aufgrund der Redundanz des Codes manchmal still sein (keine Auswirkung haben).","Alle Mutationen im genetischen Code führen zu einer Veränderung der Proteinsequenz.","Der genetische Code ist degeneriert, das bedeutet, dass einige Aminosäuren durch mehr als ein Codon codiert werden.","Jedes Codon im genetischen Code besteht aus drei Nukleotiden.","Jedes Codon im genetischen Code besteht aus vier Nukleotiden."],
c:[2,3,5,6],
e:"AUG = Startcodon = codiert für Methionin (C). Stille Mutationen möglich durch Degeneriertheit des Codes (D). Code ist degeneriert = mehrere Codons für eine AS (F). Codons = 3 Nukleotide (G). AUG codiert für Methionin, nicht Cystein (A falsch). Code ist degeneriert, nicht eindeutig 1:1 (B falsch)."},
{q:"Welche Hauptfunktionen haben Hitzeschockproteine? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Hitzeschockproteine sind winzige Proteine, die an RNA und DNA binden.","Hitzeschockproteine sind wichtig für Prozesse der Protein-Stabilität.","Hitzeschockproteine binden alle an Schmerzrezeptoren.","Hitzeschockproteine transportieren Giftstoffe aus den Zellen heraus.","Hitzeschockproteine erleichtern die Proteinfaltung anderer Proteine.","Hitzeschockproteine sind Chaperone, die bei der Proteinfaltung helfen und so globuläre Proteine bilden.","Hitzeschockproteine wirken antiviral.","Hitzeschockproteine entspannen die Atmungskette."],
c:[1,4,5],
e:"Hitzeschockproteine (HSP) = molekulare Chaperone (E, F): Sie helfen anderen Proteinen, korrekt zu falten und verhindern Misfolding und Aggregation. Wichtig für Proteinstabilität (B), besonders bei Stress wie Hitze. HSP binden nicht an Schmerzrezeptoren (C) oder transportieren keine Giftstoffe (D)."},
{q:"Was zeichnet Transkriptionsfaktoren aus? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
o:["Transkriptionsfaktoren sind Proteine, die die Information, welche Gene als nächstes transkribiert werden sollen, transportieren.","Transkriptionsfaktoren sind Schlüsselmoleküle, die auch als Energiespeicher dienen.","Transkriptionsfaktoren sind DNA-bindende Moleküle, und einige können auch an mitochondriale DNA binden, wenn sie in den inneren mitochondrialen Membranraum transportiert werden.","Transkriptionsfaktoren sind Enzyme, die direkt Phosphorylierungen im Chromatin durchführen und dadurch Super-Enhancer-Komplexe aktivieren.","Transkriptionsfaktoren sind Proteine, die die Transkription regulieren können, z. B. durch Induktion von Genen.","Transkriptionsfaktoren haben wichtige Funktionen für die Chromatinstruktur.","Transkriptionsfaktoren sind Proteine, die auch die Transkription unterdrücken können.","Transkriptionsfaktoren sind Proteine, die Abfallprodukte transportieren."],
c:[4,5,6],
e:"Transkriptionsfaktoren (TF): DNA-bindende Moleküle, z.T. auch mitochondriale DNA (C), regulieren die Transkription durch Aktivierung oder Repression (E, G), und beeinflussen die Chromatinstruktur (F). Sie sind keine Energiespeicher (B) und transportieren keine Abfallprodukte (H)."},
{q:"Was sind wichtige Eigenschaften der DNA in einer Säugetierzelle? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
o:["Die genetische Information ist in den Exons von Genen gespeichert, welche zu mRNA gespleißt werden.","Die mRNA wird aus der genetischen Information der DNA hergestellt.","DNA kann auch aus mRNA oder aus Protein hergestellt werden.","DNA stellt genetische Informationen bereit und speichert sie.","Die DNA wird direkt in Proteinsequenzen umgewandelt.","Der Genkörper ist in Exon- und Intronsequenzen organisiert.","Die DNA kodiert die genetische Information eines Organismus oder einer Zelle.","Die genetische Information ist in den Introns von Genen gespeichert, welche zu mRNA gespleißt werden."],
c:[0,1,3,5,6],
e:"DNA enthält genetische Information in Exons (A), aus denen mRNA transkribiert wird (B). DNA speichert und kodiert genetische Information (D, G). Gene = Exons + Introns (F). Reverse Transkription (RNA→DNA) existiert, aber nicht Protein→DNA (C falsch). DNA wird nicht direkt in Proteine übersetzt – dafür braucht es mRNA (E falsch)."},
{q:"Wie viele STOP-Codons gibt es in menschlichen oder Maus (Säugetier) Zellen? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Das/die STOP-Codon(s) codieren für keine der zwanzig verschiedenen Aminosäuren bei Säugetieren.","Es gibt 2 STOP-Codons, eines für die Maus und eines für den Menschen.","Maus- und menschliche Zellen haben drei verschiedene STOP-Codons.","Die Anzahl der STOP-Codons hängt vom Status des Zellzyklus ab.","Der TP53-Status bestimmt Frameshift-Mutationen und definiert dadurch die Anzahl der STOP-Codons.","5 STOP-Codons sind bei Säugetieren vorhanden: 2 bei Mäusen und 3 beim Menschen.","4 STOP-Codons existieren in Säugetierzellen.","Es gibt nur 1 STOP-Codon, da es auch nur ein START-Codon gibt."],
c:[0,2],
e:"Es gibt 3 STOP-Codons in allen Säugetieren (inkl. Maus und Mensch): UAA, UAG, UGA (C). Diese codieren für keine Aminosäure, sie terminieren nur die Translation (A). Maus und Mensch haben dieselben 3 STOP-Codons (B falsch). Anzahl ist nicht zellzyklusabhängig (D falsch)."},
{q:"Welches Verhalten wirken sich positiv gegen Fettleibigkeit aus? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Höherer Konsum einer ketogenen Diät und Reduktion von Kohlenhydraten","Ein Lebensstil, der auf langem Schlaf basiert","Lesen und Lernen ohne zu Essen, aber mit ausreichender Flüssigkeitszufuhr, z. B. mit Wasser","Eine kohlenhydratarme Ernährung","Langes Gehen oder Wandern","Kurzer Schlaf","Konsum von Getränken mit hohem Disaccharidgehalt","Lesen und Lernen mit Essen und Energydrinks"],
c:[1,2,3,4],
e:"Positiv gegen Fettleibigkeit: Ketogene Diät/wenige Kohlenhydrate reduziert Insulinspiegel und fördert Fettverbrennung (A, D). Körperliche Aktivität wie Wandern erhöht den Kalorienverbrauch (E). Zu viel Schlaf oder zuckerhaltiger Getränke fördern Gewichtszunahme. Kaloriendichte Mahlzeiten beim Lernen (H) ungünstig."},
{q:"Welche der folgenden Lipasen sind in Säugetierzellen für den Abbau von langkettigen Fettsäuren verantwortlich? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Hormon sensitive Lipase (HSL)","Adipozyten-Triglyzerid-Lipase (ATGL)","Fetttröpfchen-Lipase (FTL)","Ketonkörper-Lipase (KKL)","Vitamin A Lipase (VAL)","Pentose-Lipase 3 (PL3)","Monoacylglycerin-Lipase (MAGL)","Fruktose-Lipase (FL)"],
c:[0,1,6],
e:"Die drei Hauptlipasen der Lipolyse in Adipozyten: ATGL (B) = erster Schritt, Triacylglycerin → Diacylglycerin, HSL (A) = zweiter Schritt, Diacylglycerin → Monoacylglycerin, MAGL (G) = dritter Schritt, Monoacylglycerin → Glycerol + Fettsäure. FTL, KKL, VAL, PL3, FL (C-F, H) existieren nicht als solche."},
{q:"Kann Glycerin innerhalb des Zitronensäurezyklus (TCA-Zyklus) in Glukose umgewandelt werden? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Nein, das ist nicht möglich, nur Malat im Harnstoffzyklus kann in Glukose umgewandelt werden.","Nein, Glycerin ist das Endprodukt.","Nein, das ist nicht möglich, da Glycerin immer zu Lactat umgewandelt wird.","Ja, Glycerin kann in Glukose umgewandelt werden, und die Umwandlung zu Dihydroxyacetonphosphat (DHAP) als Zwischenprodukt ist dabei notwendig.","Ja, der Großteil des Glycerins im Plasma kann in der Leber durch Glukoneogenese in Glukose umgewandelt werden.","Nein, das ist nicht möglich, Glycerin wird immer im Fettsäureabbau verwendet.","Nein, Glycerin wird in Aminoacetonsuccinat umgewandelt.","Ja, über ein Zwischenprodukt der Glykolyse kann Glycerin in Glukose umgewandelt werden."],
c:[3,4,7],
e:"Glycerin kann über Glykolyse-Zwischenprodukte in Glukose umgewandelt werden (H). Der Weg: Glycerin → Glycerol-3-Phosphat → DHAP (D, ein Glykolyse-Intermediat) → über Glukoneogenese zu Glukose. Dies geschieht hauptsächlich in der Leber (E). DHAP ist das Schlüsselzwischenprodukt (D)."}
]
},
{
title:"Beispielprüfung 3",
qs:[
{q:"Laktosemangel, auch Laktoseintoleranz genannt, ist ein Defekt, aber in welchem Protein und was ist die Konsequenz der Laktoseintoleranz? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Laktase","Milchzucker reichert sich im Verdauungstrakt an.","Milchzucker wird über den Warburg-Effekt zu Laktat umgewandelt.","Adipozytenlipase","Amylase","Bei übermäßigem Laktosekonsum verändert sich das Mikrobiom und es kommt zu Durchfall.","Alkoholdehydrogenase","Übermäßige Laktose fördert den Tod von Bakterien im Dickdarm."],
c:[0,1,5],
e:"Laktoseintoleranz = Defekt der Laktase (A). Ohne Laktase reichert sich Milchzucker im Darm an (B) und Bakterien fermentieren ihn → Mikrobiomveränderung und Durchfall (F). Warburg-Effekt (C) hat nichts damit zu tun. Adipozytenlipase (D) baut Fette ab. Amylase (E) spaltet Stärke. Laktose fördert Bakterienwachstum, tötet sie nicht (H falsch)."},
{q:"Vier Arten von Bindungen/Wechselwirkungen helfen Proteinen, ihre tertiäre Struktur zu erhalten. Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Ionische Wechselwirkung","Disulfidbrückenbindungen","Lipophile Wechselwirkungen","Aromatische Ringbildung","Hydrophobe Wechselwirkungen","Esterbindungen","Wasserstoffbrückenbindungen","Van-der-Waals-Kräfte"],
c:[0,1,4,6,7],
e:"Die fünf Wechselwirkungen laut Moriggl-Schlüssel: Ionische WW (A), Disulfidbrücken (B), Hydrophobe WW (E), Wasserstoffbrücken (G), Van-der-Waals-Kräfte (H). Lipophile WW (C) ist kein Standardbegriff. Aromatische Ringbildung (D) ist keine Bindungsart. Esterbindungen (F) kommen in Proteinen nicht vor."},
{q:"Was sind Enzyme, was kennzeichnet sie aus und warum sind sie wichtig bei biochemischen Prozessen? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Lipide können als Enzyme wirken.","Langkettige Kohlenhydrate, auch Karbozyme genannt, wirken als Enzyme.","Enzyme können Stoffwechselvorgänge positiv oder negativ regulieren.","Enzyme können chemische Reaktionen katalysieren.","Enzyme gibt es nicht in einzelligen Organismen, sie kommen erst in mehrzelligen Organismen vor.","Enzyme haben in der Regel eine tiefe Tasche die man auch therapeutisch ausnutzen kann, z.B. für Blockierung von Substratbindung.","Enzyme sind eine Mixtur aus RNA und Protein, die auch Ribosomen genannt werden. Sie haben eine katalytische Funktion und können durchaus auch als Holoenzym wirken.","Enzyme sind Proteine."],
c:[2,3,5,7],
e:"Enzyme sind Proteine (H), katalysieren Reaktionen (D), regulieren Stoffwechsel (C) und haben ein aktives Zentrum (F). Lipide (A) und Kohlenhydrate (B) sind keine Enzyme. Enzyme gibt es auch in Einzellern (E falsch). Ribosomen sind Sonderfälle (G)."},
{q:"Was ist Albinismus und was könnte eine Ursache dafür sein? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Sonnenexposition erhöht die Produktion von Melanin.","Albinismus ist mit dem Beta-Oxidationsstoffwechsel verbunden, nämlich durch den Mangel an Acetyl-CoA.","Albinismus ist mit dem Aminosäurenstoffwechsel verbunden, nämlich dem Tyrosinstoffwechsel.","Sonnenexposition reduziert die Produktion von Melanin.","Albinismus ist ein Hautpigmentierungsdefekt, der mit einer erhöhten Empfindlichkeit gegenüber Sonnenlicht/UV-Schäden verbunden ist.","Albinismus ist eine Lebensmittelunverträglichkeit, die durch zu viel Gluten verursacht wird.","Albinismus ist in der Regel eine monogene Krankheit. Verschiedene Gene werden mit der Krankheit in Verbindung gebracht, darunter auch der Mangel an Tyrosinase, welcher zum Verlust der Melaninproduktion führt.","Albinismus ist ein Hautpigmentierungsdefekt, der mit einer verringerten Empfindlichkeit gegenüber Sonnenlicht verbunden ist."],
c:[2,4,6],
e:"Albinismus = Pigmentierungsdefekt (E) durch Störung des Tyrosinstoffwechsels (C). Tyrosin → Melanin benötigt Tyrosinase — deren Mangel verursacht Albinismus (G). Betroffene sind EMPFINDLICHER gegenüber UV (E richtig, H falsch). Beta-Oxidation (B) und Gluten (F) sind irrelevant."},
{q:"Welche Aminosäuren sind positiv oder negativ geladen? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Arginin ist positiv geladen.","Glutamin ist negativ geladen.","Glutamat ist positiv geladen.","Lysin ist positiv geladen.","Prolin ist negativ geladen.","Histidin ist negativ geladen.","Asparagin ist positiv geladen.","Asparaginsäure ist negativ geladen."],
c:[0,3,7],
e:"Positiv: Arginin (A), Lysin (D). Negativ: Asparaginsäure (H). Glutamin (B) ist neutral — nicht Glutamat! Glutamat (C) ist negativ, nicht positiv. Prolin (E) ist neutral. Histidin (F) ist positiv, nicht negativ. Asparagin (G) ist neutral."},
{q:"Sind Muskelzellen ähnlich oder unterscheiden sie sich von Fettzellen und was ist wahr für sie? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Muskelzellen enthalten nur Protein und keine Fettmasse.","Fettzellen sind polynukleär.","Muskelzellen sind polynukleär.","Große weiße Adipozyten enthalten ein riesiges Fetttropfen, der mit Perilipin bedeckt ist. Dieses dissociiert für den katabolischen Abbau durch drei Lipasen nach der Aktivierung von Protein Kinase A durch cAMP-Signalgebung.","Eine Muskelzelle hat einen einzelnen Zellkern.","Muskelzellen enthalten auch eine große Menge Fett.","Eine Muskel- und eine Fettzelle stammen von mesenchymalen Stammzellen ab.","Eine braune Fettzelle hat keinen Zellkern, produziert jedoch mechanische Energie durch die UCP-Protein-Familie."],
c:[2,3,6],
e:"Skelettmuskelzellen sind polynukleär (C). Weiße Adipozyten haben Perilipin-Schutz und PKA/cAMP-Lipolyse (D). Muskel- und Fettzellen stammen von mesenchymalen Stammzellen ab (G). Muskelzellen haben kaum Fett (A, F falsch). Fettzellen sind einkernig (B falsch). Braune Fettzellen HABEN einen Kern und produzieren Wärme via UCP, nicht mechanische Energie (H falsch)."},
{q:"Welche Aussagen zur Atmungskette in eukaryotischen Zellen sind richtig? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Die Atmungskette ist in allen Säugerzellen wichtig.","Die Atmungskette findet in der äußeren Zellmembran statt.","Sie findet im rauen endoplasmatischen Retikulum statt, weil da viel freier Sauerstoff zur Verfügung steht.","Sie findet im Golgiapparat statt, weil da viel freier Sauerstoff zur Verfügung steht.","Die Atmungskette ist für die Synthese von ATP wesentlich.","Sie findet innerhalb der Mitochondrien statt, weil praktisch nur dort freier Sauerstoff zur Verfügung steht.","Sie findet in der Cytoplasmamembran statt, weil da viel freier Sauerstoff zur Verfügung steht.","Sie findet im glatten endoplasmatischen Retikulum statt, weil praktisch nur dort freier Sauerstoff zur Verfügung steht."],
c:[4,5],
e:"Die Atmungskette ist in fast allen Säugerzellen essentiell (A), produziert ATP (E) und findet an der inneren Mitochondrienmembran statt (F). Sie findet nicht in der äußeren Zellmembran (B), ER (C/H), Golgi (D) oder Cytoplasmamembran (G) statt."},
{q:"Was sind die primäre, sekundäre, tertiäre und quartäre Struktur eines Proteins? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Die sekundäre Struktur eines Proteins kann entweder eine Alpha-Helix oder ein Beta-Faltblatt sein.","Die tertiäre Struktur eines Proteins ist das Falten von Alpha-Helices und Beta-Strängen zu Domänen eines Proteins, die der 3D-Struktur des Proteins entsprechen.","Die primäre Struktur eines Proteins wird durch den Abstand des Promotors zu den Intron-Grenzen bestimmt.","Die tertiäre Struktur eines Proteins ist eine ungefaltete Polypeptid-Kopplung, die zu Proteinaggregation und einer ER-Stress-Antwort führt.","Die sekundäre Struktur eines Proteins resultiert immer aus dem Spleißen der mRNA.","Die quartäre Struktur eines Proteins ist der Zerfall von seinen Untereinheiten zu einem Ribozym, das in der Ribosomenbiologie zu finden ist.","Die primäre Struktur eines Proteins ist die Aminosäuresequenz, die die Polypeptidkette bilden.","Die quartäre Struktur eines Proteins ist die Zusammenlagerung von Polypeptidketten oder Untereinheiten davon zu einem höherwertigen Proteinkomplex, auch Holoenzym genannt."],
c:[0,1,6,7],
e:"Sekundär = Alpha-Helix/Beta-Faltblatt (A). Tertiär = 3D-Faltung einer Kette (B). Primär = Aminosäuresequenz (G). Quartär = mehrere Ketten zu Holoenzym (H). Promotor-Abstand (C) bestimmt nicht die Primärstruktur. Tertiärstruktur ist korrekte Faltung, nicht Aggregation (D). Spleißen → mRNA-Sequenz, nicht Sekundärstruktur (E). Quartärstruktur ist Zusammenlagerung (H), nicht Zerfall (F)."},
{q:"Gesättigte Fettsäuren sind durch Folgendes gekennzeichnet. Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Gesättigte Fettsäuren sind sehr hydrophil.","Die Stickstoffstruktur weist Doppelbindungen (N=N) auf.","Das Kohlenstoffgerüst hat Doppelbindungen (C=C).","Die Stickstoffstruktur hat einzelne N-N-Bindungen.","Gesättigte Fettsäuren oder Fettsäuren im Allgemeinen können ein kleines Volumen einnehmen, sind aber sehr energiereich.","Das Kohlenstoffgerüst hat einzelne C-C-Bindungen.","Gesättigte Fettsäuren haben ein kleines Molekulargewicht.","Gesättigte Fettsäuren können auch lange Ketten bilden."],
c:[4,5,7],
e:"Gesättigte Fettsäuren: NUR Einzelbindungen im C-Gerüst (F — keine C=C!). Sehr energiereich und kompakt (E). Können lange Ketten bilden (H) z.B. Palmitinsäure (C16). Hydrophob, nicht hydrophil (A falsch). Stickstoff (B,D) ist irrelevant. C=C Doppelbindungen (C) = ungesättigte Fettsäuren. Können hohes Molekulargewicht haben (G falsch)."},
{q:"Welche der folgenden Moleküle stellen Ketonkörper dar und sind sie gute oder schlechte Nährstoffe? Welche Art von Energiequelle sind sie? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Ketonkörper sind eine langsame Form von Nährstoffen und werden daher als vorteilhaft in der Nahrung angesehen.","Folsäure","Ketonkörper schädigen Säugetiere und sind ziemlich giftig.","Ketonkörper gehören zur Gruppe der Kohlenhydrate.","Aceton","Acetoacetat","Ketonkörper gehören zur Gruppe der Fettsäuren/Lipide.","Beta-Hydroxybutyrat"],
c:[0,4,5,7],
e:"Die drei Ketonkörper: Aceton (E), Acetoacetat (F), Beta-Hydroxybutyrat (H). Sie werden aus Acetyl-CoA synthetisiert (gehören zu Lipidstoffwechsel). Nicht langsam (A) — sie sind eine schnelle alternative Energiequelle. Nicht giftig in normalen Mengen (C) — nur bei Ketoazidose. Keine Kohlenhydrate (D). Folsäure (B) ist ein Vitamin."},
{q:"Welche Auswirkungen hat Fettleibigkeit auf eine Person? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Übermäßiges Fettgewebe ist ein Reservoir für chronische Entzündungen.","Übermäßiges Fettgewebe wirkt den Prozessen chronischer Entzündungen entgegen.","Fettleibigkeit ist mit einer kürzeren Lebenserwartung verbunden.","Infektionskrankheiten sind bei fettleibigen Menschen meist weniger schwerwiegend.","Fettleibigkeit ist mit einer Reihe von Gesundheitsproblemen verbunden, z.B. Gefäßerkrankungen.","Infektionskrankheiten sind bei fettleibigen Menschen meist schwerer.","Fettleibigkeit ist mit einer längeren Lebenserwartung verbunden.","Fettleibigkeit ist nicht so schwerwiegend und lässt sich gut mit Medikamenten behandeln."],
c:[0,2,4,5],
e:"Überschüssiges Fettgewebe = chronisches Entzündungsreservoir durch Adipokine (A). Fettleibigkeit = kürzere Lebenserwartung (C). Assoziiert mit vielen Erkrankungen: Herz-Kreislauf, T2D, Krebs (E). Fettleibige Menschen haben schwerere Infektionsverläufe (F). Fettgewebe wirkt nicht entzündungshemmend (B falsch)."},
{q:"Welche der folgenden Aussagen über die Translation sind richtig? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Die Translation erfolgt in Ribosomen, die sich im Zytoplasma befinden.","Die Translation verwendet GTP als Energiequelle für die Initiation, Elongation und Termination.","mRNA wird in Kodons aus drei Nukleotiden abgelesen.","Die Translation erfolgt in Ribosomen, die sich im Zellkern befinden.","Aminosäuren müssen bei der Translation nicht aktiviert werden um eine Polypeptidkettezu bilden.","Das Ribosom synthetisiert die Polypeptidkette vom C-Terminus zum N-Terminus.","Das Ribosom synthetisiert die Polypeptidkette vom N-Terminus zum C-Terminus.","Die Translation verwendet die Faktoren I, E und T für die Initiation, Elongation und Termination."],
c:[0,1,2,6],
e:"Translation in Ribosomen im Zytoplasma (A). GTP als Energiequelle (B, für Elongationsfaktor-Funktion). Kodons = 3 Nukleotide (C). N→C-Terminus (G). Translation findet nicht im Zellkern statt (D falsch). Aminosäuren müssen als Aminoacyl-tRNA aktiviert werden (E falsch). Faktoren heißen IF, EF, RF (nicht I, E, T) (H falsch)."},
{q:"Welche RNA-Polymerase produziert welche Art von Makromolekül? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["RNA-Polymerase III produziert tRNA.","RNA-Polymerase I produziert tRNA.","RNA-Polymerase II produziert rRNA vom Zucker-Skelett.","Jede eukaryotische RNA-Polymerase produziert tRNA und in manchen Fällen auch mRNA.","RNA-Polymerase I produziert rRNA und kleine DNA.","RNA-Polymerase II produziert mRNA.","Jede eukaryotische RNA-Polymerase produziert rRNA oder nicht-kodierende lange RNAs.","RNA-Polymerase III produziert rRNA."],
c:[0,5],
e:"RNA-Pol I → rRNA (28S, 18S, 5.8S). RNA-Pol II → mRNA (F) und snRNA/miRNA. RNA-Pol III → tRNA (A) und 5S rRNA. Pol I produziert keine kleine DNA (E falsch). Pol II produziert kein rRNA vom Zucker-Skelett (C falsch). Nicht jede Pol produziert tRNA (D, G falsch)."},
{q:"Welche der folgenden Aminosäuren können durch Kinasen phosphoryliert werden und wird dabei eine positive oder eine negative Ladung an die Aminosäure übertragen? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Tryptophan","Valin","Phenylalanin","Tyrosin","Bei der Phosphorylierung einer Aminosäuren wird eine negative Ladung auf die Aminosäure übertragen.","Threonin","Serin","Bei der Phosphorylierung einer Aminosäuren wird eine positive Ladung auf die Aminosäure übertragen."],
c:[3,4,5,6],
e:"Phosphorylierbare AS: Serin (G), Threonin (F), Tyrosin (D) – alle mit OH-Gruppen. Phosphorylierung überträgt eine negative Ladung (Phosphatgruppe, E). Tryptophan (A), Valin (B), Phenylalanin (C) haben keine OH-Gruppe und können nicht phosphoryliert werden."},
{q:"Der Warburg-Effekt beschreibt die Verlagerung der Energieerzeugung von oxidativer Phosphorylierung zur Glykolyse trotz Sauerstoffvorkommen. Welche Aussagen bezüglich des Warburg-Effekts sind richtig? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Der Warburg-Effekt ist ein ziemlich ineffizienter zytoplasmatischer Energieproduktionsweg ausgehend von Glukose, trotz der Anwesenheit von Sauerstoff, aber er bietet Vorteile, beispielsweise für die Herstellung von Membranen durch Fettsäureanabolismus.","Der Warburg-Effekt ist der effizienteste zytoplasmatische Weg für die Harnstoffproduktion.","Laktat kann nicht metabolisiert werden und muss schnell umgewandelt werden.","Glukose wird zu Acetat umgewandelt, wobei die mitochondriale Pyruvatproduktion umgangen wird.","Laktat wird zu Glukose umgewandelt, wobei die Mitochondrien umgangen werden.","Krebszellen haben Vorteile, wenn sie Laktat produzieren und zum Warburg-Effekt wechseln, auch wenn Nährstoffe wie Glukose vorhanden sind. Dies kann zu einer Vermeidung einer Immunreaktion, einer Verstärkung der Zellmembranen, einer Verlangsamung des Zellzyklus und einer Neovaskularisation in einer hypoxischen Umgebung führen.","Laktat wird durch den Warburg-Effekt – auch anaerobe Glykolyse genannt – gebildet, und dabei wird zu viel Laktat ausgeschieden, welches immunsuppressiv wirkt.","Eine Zunahme der Glykolyse führt zu einer Erhöhung der O-GlcNAcylierung (UDP-GlcNAc), welche für eine post-translationale Modifikation von vielen Proteinen notwendig ist, was wiederum deren Proteinfunktion verändern kann."],
c:[0,6,7],
e:"Warburg = ineffizient für ATP aber Vorteile für Membranbau (A). Krebszellen profitieren von Laktatproduktion: weniger Immunreaktion, stärkere Membranen, Neovaskularisation (F). Erhöhte Glykolyse → mehr UDP-GlcNAc → O-GlcNAcylierung von Proteinen (H). Laktat ist metabolisierbar (C falsch)."},
{q:"Was sind wesentliche Funktionen von Lipiden im menschlichen Körper? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Lipide sind ein integraler Bestandteil für den Abbau von reaktiven Sauerstoffspezies.","Lipide sind eine schnelle Energiequelle.","Lipide sind ein wichtiger Bestandteil von Membranen.","Lipide werden nur zur Produktion von Zitronensäure für die Membranbildung verwendet.","Lipide fungieren in allen Formen als Coenzymkatalysator für Enzymreaktionen.","Lipide stellen eine mechanische Schutzbarriere dar.","Lipide sind essentiell für die Esterifizierung von Essigsäure, bei der eine Alkoholgruppe abgespalten wird.","Lipide sind eine langsame Energiequelle."],
c:[2,5,7],
e:"Lipide: wichtiger Membranbestandteil (C, Phospholipide), mechanische Schutzbarriere (F, z.B. Nierenfett), und langsame/langfristige Energiequelle (H, Triacylglyceride). Lipide sind keine Antioxidantien im klassischen Sinne (A). Lipide sind langsame, nicht schnelle Energiequelle (B falsch)."},
{q:"Was ist die kleinste Einheit lebender Materie? Bitte markieren Sie die richtige(n) Antwort(en).",

{q:"Kann eine Person aufgrund von Vorerkrankungen wie Typ-2-Diabetes (T2D) oder Fettlebererkrankung mehr unter Autoimmunerkrankungen oder chronischen Entzündungen leiden? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Chronische Entzündungen nehmen bei einer Fettlebererkrankung ab.","Chronische Entzündungen nehmen bei T2D ab.","Chronische Entzündungen nehmen bei T2D zu.","Das Risiko für eine Autoimmunerkrankung nimmt bei einer Fettlebererkrankung ab.","Das Risiko für eine Autoimmunerkrankung steigt mit T2D.","Das Risiko für eine Autoimmunerkrankung nimmt bei T2D ab.","Das Risiko für eine Autoimmunerkrankung steigt mit einer Fettlebererkrankung.","Chronische Entzündungen nehmen bei einer Fettlebererkrankung zu."],

{q:"Der genetische Code der Nukleinsäuren bestimmt die Aminosäurekette in Proteinen. Welche Aussagen über den genetischen Code sind richtig? Bitte markieren Sie die richtige(n) Antwort(en).",
o:["Mutationen in Kodons können fatale Konsequenzen für die Proteinfunktion haben, wenn Teile des Kodons verloren gehen oder zusätzliche Basenpaare eingefügt werden, oder ein STOP-Kodon in eine codierende Sequenz eingeführt wird und dadurch der Leserahmen durcheinandergerät usw..","Man kann mRNA aus der Aminosäuresequenz bei Säugetieren über einen ribosomalen Prozess herstellen.","STOP-Kodons sind wichtig, um die Polypeptidkette zu terminieren. Ein zu langes Protein könnte zu Chaos innerhalb der Zelle führen, z.B. könnten Probleme bei der Proteinbildung zu Proteinaggregation oder anderen Problemen führen.","Die drei STOP-Kodons codieren für das Ende der Elongation, jedoch nicht für irgendwelche Aminosäuren.","Es gibt 28 proteinogene Aminosäuren bei Säugetieren.","Insgesamt gibt es 64 Kodons, aber nur 61 kodieren für Aminosäuren.","Kodons bestimmen auch die Aminosäuresequenz in den Introns, aber nicht in den Exons.","Jedes Codon entspricht einer spezifischen Aminosäure oder einem Stoppsignal."],
c:[0,2,3,5,7],
e:"Mutationen können Leserahmen verschieben (A). STOP-Kodons terminieren die Kette (C, D). 64 Kodons total, 61 für AS, 3 STOP (F). Jedes Codon = AS oder Stopp (H). mRNA kann nicht aus AS-Sequenz rückgewonnen werden (B falsch). Es gibt 20 proteinogene AS bei Säugetieren, nicht 28 (E falsch). Kodons bestimmen AS in Exons, nicht Introns (G falsch)."},
{q:"Wie kommen Metabolite wie Fette, Aminosäuren, Zwischenprodukte, etc. in Zellen oder auch in Mitochondrien hinein beziehungsweise wieder heraus? Bitte markieren Sie die richtige(n) Antwort(en).",

var state = {exam:null, answers:{}, submitted:false};

function el(id){return document.getElementById(id)}
function render(){el('app').innerHTML=buildHTML()}

function buildHTML(){
  if(state.exam===null) return buildHome();
  if(state.submitted) return buildResults();
  return buildExam();
}

function buildHome(){
  return '<div class="home">'+
    '<h1>Biochemie Prüfungssimulation</h1>'+
    '<p>Wähle eine der drei Beispielprüfungen. Jede Frage ist 4 Punkte wert.<br>Bewertung: (richtig – falsch) ÷ Anzahl richtiger Antworten × 4 (min. 0)</p>'+
    '<p style="font-size:.82rem;color:#9ca3af;background:#f9f8ff;border:1px solid #e5e3f5;border-radius:8px;padding:.7rem 1rem;margin-bottom:2rem;">⚠️ Diese Simulation basiert auf der ausgearbeiteten Musterlösung (Moriggl). Keine Gewähr für die Richtigkeit der Antworten.</p>'+
    '<div class="cards">'+
    EXAMS.map(function(e,i){
      return '<button class="card" onclick="startExam('+i+')">'+
        '<div class="badge">20 Fragen · 80 Punkte</div>'+
        '<h2>'+e.title+'</h2>'+
        '<p>Multiple-Choice, 8 Optionen pro Frage</p>'+
        '</button>';
    }).join('')+
    '</div></div>';
}

function startExam(i){
  state.exam=i;
  state.answers={};
  state.submitted=false;
  render();
  window.scrollTo(0,0);
}

function toggleOpt(qi, oi){
  if(state.submitted) return;
  if(!state.answers[qi]) state.answers[qi]=new Set();
  var s=state.answers[qi];
  if(s.has(oi)) s.delete(oi); else s.add(oi);
  var block=document.getElementById('q'+qi);
  if(block){
    var opts=block.querySelectorAll('.opt');
    opts.forEach(function(o,idx){
      o.classList.toggle('sel', s.has(idx));
    });
  }
}

function buildExam(){
  var exam=EXAMS[state.exam];
  var html='<div class="exam-wrap">'+
    '<div class="exam-header">'+
    '<button class="back-btn" onclick="goHome()">← Zurück</button>'+
    '<div><div class="exam-title">'+exam.title+'</div>'+
    '<div class="exam-sub">20 Fragen · max. 80 Punkte</div></div>'+
    '</div>';
  exam.qs.forEach(function(q,qi){
    var sel=state.answers[qi]||new Set();
    html+='<div class="question-block" id="q'+qi+'">'+
      '<div class="q-header"><span class="q-num">Frage '+(qi+1)+' / 20</span><span class="q-pts">4 Punkte</span></div>'+
      '<div class="q-text">'+q.q+'</div>'+
      '<div class="options">'+
      q.o.map(function(opt,oi){
        return '<button class="opt'+(sel.has(oi)?' sel':'')+'" onclick="toggleOpt('+qi+','+oi+')">'+
          '<span class="opt-lbl">'+L[oi]+'</span>'+
          '<span class="opt-txt">'+opt+'</span>'+
          '</button>';
      }).join('')+
      '</div></div>';
  });
  html+='<div class="submit-bar"><button class="submit-btn" onclick="submitExam()">Prüfung auswerten</button></div>';
  html+='</div>';
  return html;
}

function submitExam(){
  state.submitted=true;
  render();
  window.scrollTo(0,0);
}

function scoreQ(qi){
  var exam=EXAMS[state.exam];
  var q=exam.qs[qi];
  var sel=Array.from(state.answers[qi]||new Set());
  var nc=q.c.length;
  var right=0,wrong=0;
  sel.forEach(function(s){ if(q.c.indexOf(s)>=0) right++; else wrong++; });
  return Math.max(0,(right-wrong)/nc*4);
}

function buildResults(){
  var exam=EXAMS[state.exam];
  var total=0;
  var scores=[];
  exam.qs.forEach(function(q,qi){
    var s=scoreQ(qi);
    scores.push(s);
    total+=s;
  });
  var pct=Math.round(total/80*100);
  var grade=pct>=87?'Sehr Gut':pct>=75?'Gut':pct>=63?'Befriedigend':pct>=50?'Genügend':'Nicht Genügend';
  var full=scores.filter(function(s){return s>=3.99}).length;
  var partial=scores.filter(function(s){return s>0&&s<3.99}).length;
  var zero=scores.filter(function(s){return s<=0}).length;

  var html='<div class="results">'+
    '<div class="legend">'+
    '<div class="leg"><div class="leg-dot leg-cor"></div>Richtig angekreuzt</div>'+
    '<div class="leg"><div class="leg-dot leg-wrg"></div>Falsch angekreuzt (Abzug)</div>'+
    '<div class="leg"><div class="leg-dot leg-mis"></div>Nicht angekreuzt, wäre richtig gewesen</div>'+
    '</div>'+
    '<div class="score-card">'+
    '<div class="score-big">'+total.toFixed(1)+'</div>'+
    '<div class="score-max">von 80 Punkten</div>'+
    '<div class="score-pct">'+pct+'% — '+grade+'</div>'+
    '<div class="score-stats">'+
    '<div class="stat"><div class="stat-val">'+full+'</div><div class="stat-lbl">Volle Punkte</div></div>'+
    '<div class="stat"><div class="stat-val">'+partial+'</div><div class="stat-lbl">Teilpunkte</div></div>'+
    '<div class="stat"><div class="stat-val">'+zero+'</div><div class="stat-lbl">0 Punkte</div></div>'+
    '</div></div>'+
    '<div class="results-questions"><h2>Auswertung</h2>';

  exam.qs.forEach(function(q,qi){
    var sel=Array.from(state.answers[qi]||new Set());
    var pts=scores[qi];
    var ptsClass=pts>=3.99?'full':pts>0?'partial':'zero';
    var ptsLabel=pts.toFixed(2)+' / 4.00 Punkte';

    html+='<div class="q-result-summary">'+
      '<div class="qrs-header">'+
      '<span class="qrs-num">Frage '+(qi+1)+'</span>'+
      '<span class="qrs-pts '+ptsClass+'">'+ptsLabel+'</span>'+
      '</div>'+
      '<div class="qrs-text">'+q.q+'</div>'+
      '<div class="qrs-opts">'+
      q.o.map(function(opt,oi){
        var isSel=sel.indexOf(oi)>=0;
        var isCorrect=q.c.indexOf(oi)>=0;
        var cls='opt';
        if(isSel && isCorrect) cls+=' cor';
        else if(isSel && !isCorrect) cls+=' wrg';
        else if(!isSel && isCorrect) cls+=' mis';
        return '<div class="'+cls+'">'+
          '<span class="opt-lbl">'+L[oi]+'</span>'+
          '<span class="opt-txt">'+opt+'</span>'+
          '</div>';
      }).join('')+
      '</div>'+
      (q.e?'<div class="qrs-exp">'+q.e+'</div>':'')+
      '</div>';
  });

  html+='</div>'+
    '<button class="restart-btn" onclick="startExam('+state.exam+')">Prüfung wiederholen</button>'+
    '<button class="restart-btn" onclick="goHome()">Andere Prüfung wählen</button>'+
    '</div>';

  return html;
}

function goHome(){
  state.exam=null;
  state.answers={};
  state.submitted=false;
  render();
  window.scrollTo(0,0);
}

try { render(); } catch(e) { document.getElementById('app').innerHTML = '<div style="padding:2rem;font-family:sans-serif;background:#fee;border:1px solid red;border-radius:8px;margin:2rem"><b>Fehler:</b><br>' + e.message + '</div>'; }
</script>
</body>
</html>

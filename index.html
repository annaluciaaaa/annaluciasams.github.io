html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 8vh;
}

/* Misty mountain sunrise background */
.bg {
  position: fixed;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80');
  background-size: cover;
  background-position: center 40%;
  z-index: 0;
  animation: slowZoom 25s ease-in-out infinite alternate;
}

@keyframes slowZoom {
  from { transform: scale(1); }
  to   { transform: scale(1.05); }
}

/* Warm golden overlay — matches sunrise palette */
.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(255, 200, 120, 0.08) 0%,
    rgba(180, 100, 40, 0.15) 40%,
    rgba(30, 20, 10, 0.55) 100%
  );
  z-index: 1;
}

/* Content */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5rem, 15vw, 11rem);
  font-weight: 300;
  color: #fff8f0;
  letter-spacing: 8px;
  line-height: 1;
  text-shadow: 0 2px 50px rgba(200, 100, 20, 0.4), 0 4px 80px rgba(0,0,0,0.3);
  animation: fadeUp 2s ease 0.2s forwards;
  opacity: 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.there {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  letter-spacing: 14px;
  font-size: clamp(2rem, 6vw, 4.5rem);
  color: #ffe8c8;
  margin-top: -10px;
  text-shadow: 0 2px 40px rgba(200, 100, 20, 0.35), 0 4px 60px rgba(0,0,0,0.3);
  animation: fadeUp 2s ease 0.6s forwards;
  opacity: 0;
}

.line {
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,220,160,0.7), transparent);
  margin: 28px auto;
  animation: fadeUp 2s ease 1.1s forwards;
  opacity: 0;
}

.name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: clamp(0.65rem, 1.8vw, 0.95rem);
  letter-spacing: 7px;
  text-transform: uppercase;
  color: rgba(255, 235, 200, 0.8);
  animation: fadeUp 2s ease 1.4s forwards;
  opacity: 0;
}

.coming-soon {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: clamp(0.6rem, 1.6vw, 0.85rem);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255, 220, 170, 0.6);
  margin-top: 20px;
  animation: fadeUp 2s ease 1.7s forwards;
  opacity: 0;
}

.coming-soon .star {
  color: rgba(255, 210, 130, 0.85);
  margin-left: 6px;
  font-size: 0.9em;
}

.bottom-note {
  position: fixed;
  bottom: 30px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(0.75rem, 1.8vw, 1rem);
  color: rgba(255, 225, 185, 0.4);
  letter-spacing: 2px;
  animation: fadeUp 2s ease 2.1s forwards;
  opacity: 0;
}

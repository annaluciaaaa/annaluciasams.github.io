<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignalRadar Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
button,input{font-family:'JetBrains Mono',monospace}
.sidebar{width:155px;background:#161b22;border-right:1px solid #21262d;padding:10px 6px;overflow-y:auto;flex-shrink:0;height:calc(100vh - 57px);position:sticky;top:57px}
.ticker-item{padding:6px 8px;border-radius:6px;margin-bottom:2px;cursor:pointer;transition:all 0.15s;border:1px solid transparent}
.ticker-item:hover{background:#1a2030}
.ticker-item.active{background:#1f2937;border-color:#3b82f6}
.tab-btn{padding:5px 12px;border-radius:5px;font-size:10px;cursor:pointer;transition:all 0.15s}
.tab-btn.active{background:#1f2937;color:#58a6ff;border:1px solid #58a6ff}
.tab-btn:not(.active){background:transparent;color:#555;border:1px solid #30363d}
.stat-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px 12px}
canvas{display:block}
.signal-tag{font-size:9px;background:#161b22;border:1px solid #30363d;border-radius:20px;padding:3px 9px;color:#888;display:inline-block;margin:2px}
.grp-label{font-size:8px;color:#444;letter-spacing:0.12em;padding:8px 6px 4px;text-transform:uppercase}
</style>
</head>
<body>

<div id="header" style="background:linear-gradient(90deg,#0d1117,#161b22);border-bottom:1px solid #21262d;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10">
  <div>
    <div style="font-size:20px;font-family:'Syne',sans-serif;font-weight:800;letter-spacing:-0.02em;color:#fff"><span style="color:#58a6ff">Signal</span>Radar <span style="font-size:11px;color:#444;font-weight:400">PRO</span></div>
    <div style="font-size:10px;color:#555;letter-spacing:0.1em;margin-top:1px">RSI · MACD · BOLLINGER · KI-ANALYSE</div>
  </div>
  <div style="font-size:10px;text-align:right">
    <div style="color:#3fb950">● Finnhub Live</div>
    <div id="dateLabel" style="color:#30363d"></div>
  </div>
</div>

<div style="display:flex">
  <div class="sidebar" id="sidebar"></div>
  <div style="flex:1;padding:16px;overflow-y:auto;min-width:0" id="main">
    <div style="display:flex;align-items:center;justify-content:center;height:300px;color:#555;font-size:13px">Lade Daten…</div>
  </div>
</div>

<script>
const FINNHUB_KEY="d7s72khr01qm28g8hls0";
const GROUPS={"Magnificent 7":["AAPL","MSFT","GOOGL","AMZN","META","NVDA","TSLA"],"Tech & Chips":["AMD","INTC","VRT","TMO"],"Wachstum":["HIMS","LNTH","FSLR","NVO","PYPL","BABA","AOS"],"ETFs":["SPY","QQQ","ACWI"]};
const ALL=Object.values(GROUPS).flat();
const S={active:"AAPL",stocks:{},tab:"price",aiText:"",aiLoading:false,custom:[]};

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("de-AT");

// Math
const sma=(d,p)=>d.map((_,i)=>i<p-1?null:d.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p);
const ema=(d,p)=>{const k=2/(p+1),e=[];d.forEach((v,i)=>e.push(i?v*k+e[i-1]*(1-k):v));return e;};
function calcRSI(c,p=14){return c.map((_,i)=>{if(i<p)return null;let g=0,l=0;for(let j=i-p+1;j<=i;j++){const x=c[j]-c[j-1];x>0?g+=x:l-=x;}return 100-100/(1+g/(l||1e-6));});}
function calcMACD(c){const l=ema(c,12).map((v,i)=>v-ema(c,26)[i]);const s=[...Array(26).fill(null),...ema(l.slice(26),9)];return{line:l,sig:s,hist:l.map((v,i)=>s[i]!=null?v-s[i]:null)};}
function calcBoll(c,p=20,m=2){const sm=sma(c,p);return c.map((_,i)=>{if(!sm[i])return{u:null,mid:null,l:null};const sl=c.slice(i-p+1,i+1),mn=sm[i],std=Math.sqrt(sl.reduce((a,v)=>a+(v-mn)**2,0)/p);return{u:mn+m*std,mid:mn,l:mn-m*std};});}
function calcSignal(rv,mv,price,bv){
  const lr=rv.filter(Boolean).at(-1),lm=mv.hist.filter(Boolean).at(-1),pm=mv.hist.filter(Boolean).at(-2),lb=bv.filter(b=>b.u).at(-1);
  let sc=0;const rs=[];
  if(lr<30){sc+=2;rs.push("RSI überverkauft");}else if(lr<40){sc+=1;rs.push("RSI niedrig");}else if(lr>70){sc-=2;rs.push("RSI überkauft");}else if(lr>60){sc-=1;rs.push("RSI hoch");}
  if(pm<0&&lm>0){sc+=2;rs.push("MACD Crossover ↑");}else if(pm>0&&lm<0){sc-=2;rs.push("MACD Crossover ↓");}else if(lm>0){sc+=1;rs.push("MACD positiv");}else{sc-=1;rs.push("MACD negativ");}
  if(lb&&price<=lb.l){sc+=2;rs.push("Preis an unterem BB");}else if(lb&&price>=lb.u){sc-=2;rs.push("Preis an oberem BB");}
  if(sc>=3)return{s:"BULLISH",c:"#00c896",i:"▲",sc,rs};
  if(sc<=-3)return{s:"BÄRISCH",c:"#ff4757",i:"▼",sc,rs};
  return{s:"NEUTRAL",c:"#ffa502",i:"●",sc,rs};
}

// Mock
function mock(t){
  const b={AAPL:185,MSFT:415,GOOGL:175,AMZN:195,META:530,NVDA:120,TSLA:180,AMD:165,INTC:22,SPY:560,QQQ:475,NVO:90,PYPL:68};
  let p=b[t]||80;const now=new Date(),data=[];
  for(let i=89;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);p*=1+(Math.random()-.48)*.025;data.push({date:d.toISOString().slice(0,10),c:+p.toFixed(2)});}
  return data;
}

// Fetch
async function fetchStock(t){
  try{
    const to=Math.floor(Date.now()/1000),from=to-90*86400;
    const r=await fetch("https://finnhub.io/api/v1/stock/candle?symbol="+t+"&resolution=D&from="+from+"&to="+to+"&token="+FINNHUB_KEY);
    const j=await r.json();
    if(!j.c||j.s!=="ok")return mock(t);
    return j.t.map((ts,i)=>({date:new Date(ts*1000).toISOString().slice(0,10),c:j.c[i]}));
  }catch{return mock(t);}
}
function processStock(raw){
  const closes=raw.map(d=>d.c);
  const rv=calcRSI(closes),mv=calcMACD(closes),bv=calcBoll(closes),s50=sma(closes,50);
  const last=closes.at(-1),chg=(last-closes.at(-2))/closes.at(-2)*100;
  return{raw,closes,rv,mv,bv,s50,last,chg,sig:calcSignal(rv,mv,last,bv)};
}

// Canvas chart
function drawChart(canvasId,datasets,opts){
  opts=opts||{};
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-16;
  const H=opts.h||200;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const pl=54,pr=8,pt=10,pb=28,cw=W-pl-pr,ch=H-pt-pb;

  const allVals=datasets.flatMap(ds=>(ds.data||[]).filter(v=>v!=null&&isFinite(v)));
  if(!allVals.length)return;
  let mn=opts.yMin!=null?opts.yMin:Math.min(...allVals);
  let mx=opts.yMax!=null?opts.yMax:Math.max(...allVals);
  const rng=mx-mn||1;
  const tx=(i,len)=>pl+i/(Math.max(len-1,1))*cw;
  const ty=v=>pt+ch-(v-mn)/rng*ch;

  ctx.fillStyle="#161b22";ctx.fillRect(0,0,W,H);

  // Grid
  [0,.25,.5,.75,1].forEach(f=>{
    const y=pt+f*ch;
    ctx.strokeStyle="#21262d";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();
    const val=mx-f*rng;
    ctx.fillStyle="#444";ctx.font="9px monospace";ctx.textAlign="right";
    const lbl=opts.pct?val.toFixed(1):(val>100?val.toFixed(0):"$"+val.toFixed(2));
    ctx.fillText(lbl,pl-4,y+3);
  });

  // Refs
  (opts.refs||[]).forEach(function(ref){
    const y=ty(ref.v);ctx.strokeStyle=ref.color;ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();ctx.setLineDash([]);
  });

  // X labels
  const len=datasets.find(ds=>ds.data)?.data?.length||90;
  const lbls=datasets.find(ds=>ds.labels)?.labels||[];
  ctx.fillStyle="#444";ctx.font="9px monospace";ctx.textAlign="center";
  [0,Math.floor(len/4),Math.floor(len/2),Math.floor(3*len/4),len-1].forEach(function(i){
    if(lbls[i])ctx.fillText((lbls[i]||"").slice(5),tx(i,len),H-8);
  });

  // Datasets
  datasets.forEach(function(ds){
    if(!ds.data)return;
    if(ds.type==="bar"){
      const barW=Math.max(1,cw/ds.data.length-1);
      ds.data.forEach(function(v,i){
        if(v==null)return;
        const x=tx(i,ds.data.length),y0=ty(0),y1=ty(v);
        ctx.fillStyle=v>=0?"#3fb95060":"#f8514960";
        ctx.fillRect(x-barW/2,Math.min(y0,y1),barW,Math.abs(y1-y0));
      });
      return;
    }
    if(ds.fill&&ds.fillColor){
      ctx.beginPath();let st=false;
      ds.data.forEach(function(v,i){if(v==null)return;const x=tx(i,ds.data.length),y=ty(v);st?ctx.lineTo(x,y):(ctx.moveTo(x,y),st=true);});
      ctx.lineTo(tx(ds.data.length-1,ds.data.length),pt+ch);ctx.lineTo(pl,pt+ch);ctx.closePath();
      ctx.fillStyle=ds.fillColor;ctx.fill();
    }
    ctx.beginPath();ctx.strokeStyle=ds.color||"#fff";ctx.lineWidth=ds.width||1.5;
    if(ds.dash)ctx.setLineDash(ds.dash);
    let st=false;
    ds.data.forEach(function(v,i){if(v==null){st=false;return;}const x=tx(i,ds.data.length),y=ty(v);st?ctx.lineTo(x,y):(ctx.moveTo(x,y),st=true);});
    ctx.stroke();ctx.setLineDash([]);
  });
}

function drawCurrent(){
  const d=S.stocks[S.active];if(!d)return;
  const labels=d.raw.map(r=>r.date);
  if(S.tab==="price"){
    drawChart("chart",[
      {data:d.bv.map(b=>b.u),labels,color:"#58a6ff30",width:1,fill:true,fillColor:"#58a6ff08"},
      {data:d.bv.map(b=>b.l),labels,color:"#58a6ff30",width:1},
      {data:d.bv.map(b=>b.mid),labels,color:"#58a6ff50",width:1,dash:[3,3]},
      {data:d.s50,labels,color:"#ffa50050",width:1},
      {data:d.closes,labels,color:"#3fb950",width:2},
    ]);
  }else if(S.tab==="rsi"){
    drawChart("chart",[{data:d.rv,labels,color:"#ffa502",width:2}],
      {yMin:0,yMax:100,refs:[{v:70,color:"#f8514960"},{v:30,color:"#3fb95060"},{v:50,color:"#30363d"}],pct:true});
  }else{
    drawChart("chart",[
      {data:d.mv.hist,labels,type:"bar"},
      {data:d.mv.line,labels,color:"#ffa502",width:1.5},
      {data:d.mv.sig,labels,color:"#f85149",width:1.5},
    ]);
  }
}

// Render sidebar
function renderSidebar(){
  const el=document.getElementById("sidebar");
  const groups=Object.assign({},GROUPS);
  if(S.custom.length)groups["Eigene"]=S.custom;
  el.innerHTML=Object.entries(groups).map(function(entry){
    const grp=entry[0],tickers=entry[1];
    return'<div class="grp-label">'+grp+'</div>'+tickers.map(function(t){
      const d=S.stocks[t];
      return'<div class="ticker-item'+(S.active===t?" active":"")+'" onclick="doSelect(\''+t+'\')">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<span style="font-size:11px;font-weight:600;color:'+(S.active===t?"#58a6ff":"#e6edf3")+'">'+t+'</span>'
        +'<span onclick="event.stopPropagation();doRemove(\''+t+'\')" style="font-size:9px;color:#333;padding:0 2px">✕</span>'
        +'</div>'
        +(d?'<div style="font-size:10px;color:'+(d.chg>=0?"#3fb950":"#f85149")+'">'+(d.chg>=0?"+":"")+d.chg.toFixed(2)+'%</div>'
           +'<div style="font-size:9px;color:'+d.sig.c+'">'+d.sig.i+' '+d.sig.s+'</div>'
          :'<div style="font-size:9px;color:#333">lädt…</div>')
        +'</div>';
    }).join("");
  }).join("")
  +'<div style="margin-top:10px;padding:0 2px">'
  +'<input id="ti" placeholder="+ TICKER" maxlength="6" onkeydown="if(event.key===\'Enter\')doAdd()"'
  +' style="background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:6px 8px;font-size:11px;color:#e6edf3;outline:none;width:100%;margin-bottom:4px"/>'
  +'<button onclick="doAdd()" style="background:#1f6feb;border:none;border-radius:5px;padding:5px;font-size:10px;color:#fff;width:100%;font-weight:600">Hinzufügen</button>'
  +'</div>';
}

// Render main
function renderMain(){
  const d=S.stocks[S.active];
  const el=document.getElementById("main");
  if(!d){el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#555;font-size:13px">Lade '+S.active+'…</div>';return;}
  const sig=d.sig;
  const lr=d.rv.filter(Boolean).at(-1);
  const lm=d.mv.hist.filter(Boolean).at(-1);
  const lb=d.bv.filter(b=>b.u).at(-1);
  const bbpos=lb?((d.last-lb.l)/(lb.u-lb.l)*100).toFixed(0)+"%":"–";
  const rc=lr<30?"#3fb950":lr>70?"#f85149":"#ffa502";

  el.innerHTML=
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">'
    +'<div><div style="font-size:26px;font-weight:700;font-family:\'Syne\',sans-serif;color:#fff;letter-spacing:-0.02em">'+S.active+'</div>'
    +'<div style="display:flex;align-items:baseline;gap:10px;margin-top:3px">'
    +'<span style="font-size:20px;font-weight:600">$'+d.last.toFixed(2)+'</span>'
    +'<span style="font-size:13px;color:'+(d.chg>=0?"#3fb950":"#f85149")+'">'+(d.chg>=0?"+":"")+d.chg.toFixed(2)+'%</span></div></div>'
    +'<div style="background:'+sig.c+'18;border:1px solid '+sig.c+'40;border-radius:10px;padding:10px 16px;text-align:center">'
    +'<div style="font-size:20px;color:'+sig.c+';font-weight:700">'+sig.i+' '+sig.s+'</div>'
    +'<div style="font-size:9px;color:#555;margin-top:2px">SCORE: '+(sig.sc>0?"+":"")+sig.sc+'</div></div></div>'
    +'<div style="margin-bottom:14px">'+sig.rs.map(r=>'<span class="signal-tag">'+r+'</span>').join("")+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'
    +'<div class="stat-card"><div style="font-size:8px;color:#555;margin-bottom:4px">RSI (14)</div><div style="font-size:15px;font-weight:600;color:'+rc+'">'+(lr?lr.toFixed(1):"–")+'</div></div>'
    +'<div class="stat-card"><div style="font-size:8px;color:#555;margin-bottom:4px">MACD Hist.</div><div style="font-size:15px;font-weight:600;color:'+(lm>0?"#3fb950":"#f85149")+'">'+(lm?lm.toFixed(4):"–")+'</div></div>'
    +'<div class="stat-card"><div style="font-size:8px;color:#555;margin-bottom:4px">BB Position</div><div style="font-size:15px;font-weight:600;color:#58a6ff">'+bbpos+'</div></div></div>'
    +'<div style="display:flex;gap:4px;margin-bottom:10px">'
    +['price','rsi','macd'].map(function(t,_,arr){const l=["Kurs + BB","RSI","MACD"][arr.indexOf(t)];return'<button class="tab-btn'+(S.tab===t?" active":"")+'" onclick="doTab(\''+t+'\')">'+l+'</button>';}).join("")
    +'</div>'
    +'<div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:8px;margin-bottom:14px">'
    +'<canvas id="chart"></canvas></div>'
    +'<div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px;margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:10px;color:#555;letter-spacing:0.1em">🤖 KI-ANALYSE</div>'
    +'<button onclick="doAI()" '+(S.aiLoading?"disabled":"")+' style="background:'+(S.aiLoading?"#30363d":"#1f6feb")+';border:none;border-radius:6px;padding:5px 12px;font-size:10px;color:#fff;font-weight:600;opacity:'+(S.aiLoading?.7:1)+'">'+(S.aiLoading?"Analysiere…":"Analysieren")+'</button></div>'
    +'<div id="aiResult" style="font-size:12px;color:'+(S.aiText?"#8b949e":"#30363d")+';line-height:1.7;font-family:\'Syne\',sans-serif;font-style:'+(S.aiText?"normal":"italic")+'">'+(S.aiText||"Klick auf „Analysieren" für eine KI-Einschätzung.")+'</div></div>'
    +'<div style="font-size:9px;color:#30363d;text-align:center;font-style:italic;padding-bottom:20px">Technische Indikatoren — rein informativ. Keine Anlageberatung. Eigene Recherche erforderlich.</div>';

  setTimeout(drawCurrent,50);
}

// Actions
window.doSelect=async function(t){
  S.active=t;S.aiText="";S.tab="price";
  renderSidebar();renderMain();
  if(!S.stocks[t]){
    const raw=await fetchStock(t);
    S.stocks[t]=processStock(raw);
    renderSidebar();renderMain();
  }
};
window.doTab=function(t){S.tab=t;renderMain();};
window.doAdd=function(){
  const v=(document.getElementById("ti")?.value||"").trim().toUpperCase();
  if(!v)return;
  if(!ALL.includes(v)&&!S.custom.includes(v))S.custom.push(v);
  doSelect(v);
};
window.doRemove=function(t){
  S.custom=S.custom.filter(x=>x!==t);
  if(S.active===t)doSelect(ALL[0]);else renderSidebar();
};
window.doAI=async function(){
  const d=S.stocks[S.active];if(!d)return;
  S.aiLoading=true;S.aiText="";renderMain();
  try{
    const lr=d.rv.filter(Boolean).at(-1),lm=d.mv.hist.filter(Boolean).at(-1);
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:
        "Analysiere diese Aktie auf Deutsch in max. 3 Sätzen. Ticker: "+S.active+", Kurs: $"+d.last.toFixed(2)+", Signal: "+d.sig.s+", RSI: "+(lr?.toFixed(1))+", MACD: "+(lm?.toFixed(4))+", Indikatoren: "+d.sig.rs.join(", ")+". Was sagen die Indikatoren? Worauf achten? Kein Disclaimer."
      }]})
    });
    const j=await res.json();
    S.aiText=j.content?.[0]?.text||"Nicht verfügbar.";
  }catch{S.aiText="Analyse nicht verfügbar.";}
  S.aiLoading=false;renderMain();
};

window.addEventListener("resize",drawCurrent);

// Init
(async function(){
  renderSidebar();renderMain();
  const raw=await fetchStock(S.active);
  S.stocks[S.active]=processStock(raw);
  renderSidebar();renderMain();
  for(const t of ALL.filter(x=>x!==S.active)){
    await new Promise(r=>setTimeout(r,350));
    const r=await fetchStock(t);
    S.stocks[t]=processStock(r);
    renderSidebar();
  }
})();
</script>

</body>
</html>

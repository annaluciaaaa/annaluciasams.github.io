// Math
const sma=(d,p)=>d.map((_,i)=>i<p-1?null:d.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p);
const ema=(d,p)=>{const k=2/(p+1),e=[];d.forEach((v,i)=>e.push(i?v*k+e[i-1]*(1-k):v));return e;};
function calcRSI(c,p=14){return c.map((_,i)=>{if(i<p)return null;let g=0,l=0;for(let j=i-p+1;j<=i;j++){const x=c[j]-c[j-1];x>0?g+=x:l-=x;}return 100-100/(1+g/(l||1e-6));});}
function calcMACD(c){const l=ema(c,12).map((v,i)=>v-ema(c,26)[i]);const s=[...Array(26).fill(null),...ema(l.slice(26),9)];return{line:l,sig:s,hist:l.map((v,i)=>s[i]!=null?v-s[i]:null)};}
function calcBoll(c,p=20,m=2){const sm=sma(c,p);return c.map((_,i)=>{if(!sm[i])return{u:null,mid:null,l:null};const sl=c.slice(i-p+1,i+1),mn=sm[i],std=Math.sqrt(sl.reduce((a,v)=>a+(v-mn)**2,0)/p);return{u:mn+m*std,mid:mn,l:mn-m*std};});}
function calcSignal(rv,mv,price,bv){
  const lr=rv.filter(Boolean).at(-1),lm=mv.hist.filter(Boolean).at(-1),pm=mv.hist.filter(Boolean).at(-2),lb=bv.filter(b=>b.u).at(-1);
  let sc=0;const rs=[];
  if(lr<30){sc+=2;rs.push("RSI oversold");}else if(lr<40){sc+=1;rs.push("RSI low");}else if(lr>70){sc-=2;rs.push("RSI overbought");}else if(lr>60){sc-=1;rs.push("RSI high");}
  if(pm<0&&lm>0){sc+=2;rs.push("MACD Crossover +");}else if(pm>0&&lm<0){sc-=2;rs.push("MACD Crossover -");}else if(lm>0){sc+=1;rs.push("MACD positive");}else{sc-=1;rs.push("MACD negative");}
  if(lb&&price<=lb.l){sc+=2;rs.push("Price at lower BB");}else if(lb&&price>=lb.u){sc-=2;rs.push("Price at upper BB");}
  if(sc>=3)return{s:"BULLISH",c:"#00c896",i:"^",sc,rs};
  if(sc<=-3)return{s:"BEARISH",c:"#ff4757",i:"v",sc,rs};
  return{s:"NEUTRAL",c:"#ffa502",i:"o",sc,rs};
}

// Direct Yahoo Finance via allorigins proxy - no server needed
async function yahooFetch(ticker, range, interval){
  var t=ticker.replace("^","%5E");
  var iv=interval||"1d";
  var url="https://query1.finance.yahoo.com/v8/finance/chart/"+t+"?interval="+iv+"&range="+range;
  var proxies=[
    "https://corsproxy.io/?"+encodeURIComponent(url),
    "https://api.allorigins.win/raw?url="+encodeURIComponent(url),
    "https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url),
  ];
  for(var i=0;i<proxies.length;i++){
    try{
      var ctrl=new AbortController();
      setTimeout(function(){ctrl.abort()},10000);
      var r=await fetch(proxies[i],{signal:ctrl.signal});
      if(!r.ok) continue;
      var text=await r.text();
      var j=JSON.parse(text);
      var res=j.chart&&j.chart.result&&j.chart.result[0];
      if(!res||!res.timestamp) continue;
      var data=res.timestamp.map(function(ts,k){
        return{date:new Date(ts*1000).toISOString().slice(0,10),c:res.indicators.quote[0].close[k],v:res.indicators.quote[0].volume[k]||0};
      }).filter(function(x){return x.c&&x.c>0;});
      if(data.length>2) return data;
    }catch(e){}
  }
  throw new Error("all proxies failed");
}

async function fetchIntraday(t, range){
  try{
    var iv=range==="1d"?"5m":"60m";
    var yr=range==="1w"?"5d":"1d";
    return await yahooFetch(t,yr,iv);
  }catch(e){return null;}
}

async function fetchStock(t){
  try{
    var data=await yahooFetch(t,"5y","1d");
    if(data&&data.length>10) return data;

  }catch(e){return null;}
}
function processStock(raw){
  const closes=raw.map(d=>d.c);
  const vols=raw.map(d=>d.v||0);
  const rv=calcRSI(closes),mv=calcMACD(closes),bv=calcBoll(closes);
  const s20=sma(closes,20),s50=sma(closes,50),s200=sma(closes,200);
  const last=closes.at(-1),chg=(last-closes.at(-2))/closes.at(-2)*100;

  // Fibonacci retracement levels based on last 52 weeks
  const slice=closes.slice(-252);
  const hi=Math.max(...slice),lo=Math.min(...slice);
  const diff=hi-lo;
  const fib={
    hi:hi,lo:lo,
    r236:hi-diff*0.236,
    r382:hi-diff*0.382,
    r500:hi-diff*0.500,
    r618:hi-diff*0.618,
    r786:hi-diff*0.786,
  };

  // Performance for different periods
  function perf(days){
    if(closes.length<=days) return null;
    const old=closes[closes.length-1-days];
    return{pct:((last-old)/old*100),abs:(last-old)};
  }
  const perf1d=perf(1),perf1w=perf(5),perf1m=perf(21),perf3m=perf(63),perf6m=perf(126),perf1y=perf(252);

  return{raw,closes,vols,rv,mv,bv,s20,s50,s200,last,chg,sig:calcSignal(rv,mv,last,bv),fib,perf1d,perf1w,perf1m,perf3m,perf6m,perf1y};
}

// Filter raw data by range
function filterByRange(raw, range){
  if(range==="all") return raw;
  const now=new Date();
  const cutoff=new Date(now);
  if(range==="1d") cutoff.setDate(cutoff.getDate()-1);
  else if(range==="1w") cutoff.setDate(cutoff.getDate()-7);
  else if(range==="1m") cutoff.setMonth(cutoff.getMonth()-1);
  else if(range==="3m") cutoff.setMonth(cutoff.getMonth()-3);
  else if(range==="6m") cutoff.setMonth(cutoff.getMonth()-6);
  else if(range==="1y") cutoff.setFullYear(cutoff.getFullYear()-1);
  const cutStr=cutoff.toISOString().slice(0,10);
  const filtered=raw.filter(function(d){return d.date>=cutStr;});
  return filtered.length>1?filtered:raw.slice(-5);
}

// Canvas chart
function drawChart(canvasId,datasets,opts){
  opts=opts||{};
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-16;
  const H=opts.h||200;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const pl=54,pr=8,pt=10,pb=28,cw=W-pl-pr,ch=H-pt-pb;

  const allVals=datasets.flatMap(ds=>(ds.data||[]).filter(v=>v!=null&&isFinite(v)));
  if(!allVals.length)return;
  let mn=opts.yMin!=null?opts.yMin:Math.min(...allVals);
  let mx=opts.yMax!=null?opts.yMax:Math.max(...allVals);
  const rng=mx-mn||1;
  const tx=(i,len)=>pl+i/(Math.max(len-1,1))*cw;
  const ty=v=>pt+ch-(v-mn)/rng*ch;

  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,H);

  // Grid
  [0,.25,.5,.75,1].forEach(f=>{
    const y=pt+f*ch;
    ctx.strokeStyle="#f1f5f9";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();
    const val=mx-f*rng;
    ctx.fillStyle="#94a3b8";ctx.font="9px monospace";ctx.textAlign="right";
    const lbl=opts.pct?val.toFixed(1):(val>100?val.toFixed(0):"$"+val.toFixed(2));
    ctx.fillText(lbl,pl-4,y+3);
  });

  // Refs
  (opts.refs||[]).forEach(function(ref){
    const y=ty(ref.v);ctx.strokeStyle=ref.color;ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();ctx.setLineDash([]);
  });

  // Fibonacci lines
  (opts.fibRefs||[]).forEach(function(fib){
    if(fib.v<mn||fib.v>mx) return;
    const y=ty(fib.v);
    ctx.strokeStyle=fib.color+"90";ctx.lineWidth=1;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=fib.color;ctx.font="bold 8px monospace";ctx.textAlign="left";
    ctx.fillText(fib.label+" $"+(fib.v.toFixed(0)),pl+3,y-3);
  });

  // X labels
  const len=datasets.find(ds=>ds.data)?.data?.length||90;
  const lbls=datasets.find(ds=>ds.labels)?.labels||[];
  ctx.fillStyle="#94a3b8";ctx.font="9px monospace";ctx.textAlign="center";
  [0,Math.floor(len/4),Math.floor(len/2),Math.floor(3*len/4),len-1].forEach(function(i){
    if(lbls[i]){
      ctx.font="bold 10px monospace";ctx.fillStyle="#475569";
      var dateStr=lbls[i]||"";
      var cr=opts.chartRange||S.range||"3m";
      var label;
      if(cr==="all"||cr==="1y") label=dateStr.slice(0,7);
      else label=dateStr.slice(5);
      ctx.fillText(label,tx(i,len),H-5);
    }
  });

  // Datasets
  datasets.forEach(function(ds){
    if(!ds.data)return;
    if(ds.type==="bar"){
      const barW=Math.max(1,cw/ds.data.length-1);
      ds.data.forEach(function(v,i){
        if(v==null)return;
        const x=tx(i,ds.data.length),y0=ty(0),y1=ty(v);
        ctx.fillStyle=ds.colors?ds.colors[i]:(v>=0?"#3fb95060":"#f8514960");
        ctx.fillRect(x-barW/2,Math.min(y0,y1),barW,Math.abs(y1-y0));
      });
      // Draw average line if provided
      if(opts.volAvg){
        const y=ty(opts.volAvg);
        ctx.strokeStyle="#6366f180";ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(pl+cw,y);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle="#6366f1";ctx.font="9px monospace";ctx.textAlign="left";
        ctx.fillText("Avg",pl+2,y-3);
      }
      return;
    }
    if(ds.fill&&ds.fillColor){
      ctx.beginPath();let st=false;
      ds.data.forEach(function(v,i){if(v==null)return;const x=tx(i,ds.data.length),y=ty(v);st?ctx.lineTo(x,y):(ctx.moveTo(x,y),st=true);});
      ctx.lineTo(tx(ds.data.length-1,ds.data.length),pt+ch);ctx.lineTo(pl,pt+ch);ctx.closePath();
      ctx.fillStyle=ds.fillColor;ctx.fill();
    }
    ctx.beginPath();ctx.strokeStyle=ds.color||"#fff";ctx.lineWidth=ds.width||1.5;
    if(ds.dash)ctx.setLineDash(ds.dash);
    let st=false;
    ds.data.forEach(function(v,i){if(v==null){st=false;return;}const x=tx(i,ds.data.length),y=ty(v);st?ctx.lineTo(x,y):(ctx.moveTo(x,y),st=true);});
    ctx.stroke();ctx.setLineDash([]);
  });
}

function drawCurrent(){
  const d=S.stocks[S.active];if(!d)return;
  var range=S.range;
  // Use intraday data for 1d view if available
  var rawData=(range==="1d"&&S.intraday[S.active])?S.intraday[S.active]:d.raw;
  const filtered=filterByRange(rawData,S.range);
  const closes=filtered.map(x=>x.c);
  const rv2=calcRSI(closes),mv2=calcMACD(closes),bv2=calcBoll(closes),s50f=sma(closes,50);
  const labels=filtered.map(r=>r.date);
  if(S.tab==="price"){
    var s200f=sma(d.closes,200);
    var fibRefs=[];
    if(S.showFib&&d.fib){
      fibRefs=[
        {v:d.fib.hi,color:"#6366f1",label:"H"},
        {v:d.fib.r786,color:"#ef4444",label:".786"},
        {v:d.fib.r618,color:"#f97316",label:".618"},
        {v:d.fib.r500,color:"#f59e0b",label:".500"},
        {v:d.fib.r382,color:"#10b981",label:".382"},
        {v:d.fib.r236,color:"#06b6d4",label:".236"},
        {v:d.fib.lo,color:"#8b5cf6",label:"L"},
      ].filter(function(f){return f.v;});
    }
    drawChart("chart",[
      {data:bv2.map(b=>b.u),labels,color:"#58a6ff30",width:1,fill:true,fillColor:"#58a6ff08"},
      {data:bv2.map(b=>b.l),labels,color:"#58a6ff30",width:1},
      {data:bv2.map(b=>b.mid),labels,color:"#58a6ff50",width:1,dash:[3,3]},
      {data:s50f,labels,color:"#ffa50080",width:1},
      {data:s200f,labels,color:"#ff458070",width:1,dash:[4,4]},
      {data:closes,labels,color:"#3fb950",width:2},
    ],{chartRange:S.range,fibRefs:fibRefs});
  }else if(S.tab==="rsi"){
    drawChart("chart",[{data:d.rv,labels,color:"#ffa502",width:2}],
      {yMin:0,yMax:100,refs:[{v:70,color:"#f8514960"},{v:30,color:"#3fb95060"},{v:50,color:"#30363d"}],pct:true});
  }else if(S.tab==="vol"){
    // Color bars green/red based on price change
    var volColors=d.closes.map(function(c,i){return i>0&&c>=d.closes[i-1]?"#3fb95060":"#f8514960";});
    var avgVol=d.vols.reduce(function(a,b){return a+b;},0)/d.vols.length;
    drawChart("chart",[
      {data:d.vols,labels,type:"bar",colors:volColors},
    ],{volAvg:avgVol,chartRange:S.range});
  }else if(S.tab==="news"||S.tab==="compare"){
    // No chart for these tabs
    setTimeout(drawCompareChart,50);
  }else{
    drawChart("chart",[
      {data:d.mv.hist,labels,type:"bar"},
      {data:d.mv.line,labels,color:"#ffa502",width:1.5},
      {data:d.mv.sig,labels,color:"#f85149",width:1.5},
    ]);
  }
}

      +'<div style="display:flex;align-items:center;gap:4px">'
      +(activeInGroup?'<div style="width:6px;height:6px;border-radius:50%;background:#6366f1"></div>':"")
      +'<span style="font-size:14px;color:#94a3b8;font-weight:700;line-height:1">'+(isCollapsed?"›":"‹")+'</span>'
      +'</div></div>'
      +(!isCollapsed?tickers.map(function(t){
        const d=S.stocks[t];
        const label=t.replace("^","").replace("-USD","");
        return'<div class="ticker-item'+(S.active===t?" active":"")+'" onclick="doSelect(\''+t+'\')">'
          +'<div style="display:flex;justify-content:space-between;align-items:center">'
          +'<span style="font-size:12px;font-weight:700;color:'+(S.active===t?"#6366f1":"#1e2a4a")+'">'+label+'</span>'
          +(S.custom.includes(t)?'<span onclick="event.stopPropagation();doRemove(\''+t+'\')" style="font-size:9px;color:#cbd5e1;padding:0 2px">x</span>':"")
          +'</div>'
          +(d?'<div style="font-size:11px;font-weight:600;color:'+(d.chg>=0?"#10b981":"#ef4444")+'">'+(d.chg>=0?"+":"")+d.chg.toFixed(2)+'%'
             +(S.liveLoaded[t]?' <span style="font-size:8px;color:#10b981">live</span>':' <span style="font-size:8px;color:#f59e0b">demo</span>')
             +'</div>'
             +'<div style="font-size:9px;color:'+d.sig.c+'">'+d.sig.i+' '+d.sig.s+'</div>'
            :'<div style="font-size:9px;color:#94a3b8">loading...</div>')
          +'</div>';
      }).join(""):"")
      +'</div>';
  }).join("")
  +'<div style="margin-top:12px;padding:0 4px">'
  +'<input id="ti" placeholder="+ Add ticker" maxlength="10" onkeydown="if(event.key===\'Enter\')doAdd()"'
  +' style="background:#f8f9ff;border:1.5px solid #e2e8f8;border-radius:8px;padding:7px 8px;font-size:11px;color:#1e2a4a;outline:none;width:100%;margin-bottom:6px"/>'
  +'<button onclick="doAdd()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;padding:7px;font-size:10px;color:#fff;width:100%;font-weight:700;box-shadow:0 2px 8px rgba(99,102,241,0.3)">Add</button>'
  +'</div>';
}

// Render main
function renderMain(){
  const d=S.stocks[S.active];
  const el=document.getElementById("main");
  if(!d){el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#94a3b8;font-size:13px">Loading '+S.active+'...</div>';return;}
  const sig=d.sig;
  const lr=d.rv.filter(Boolean).at(-1);
  const lm=d.mv.hist.filter(Boolean).at(-1);
  const lb=d.bv.filter(b=>b.u).at(-1);
  const bbpos=lb?((d.last-lb.l)/(lb.u-lb.l)*100).toFixed(0)+"%":"-";
  const rc=lr<30?"#3fb950":lr>70?"#f85149":"#ffa502";

  el.innerHTML=
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">'
    +'<div><div style="font-size:26px;font-weight:700;font-family:\'Syne\',sans-serif;color:#fff;letter-spacing:-0.02em">'+S.active+'</div>'
    +(NAMES[S.active]?'<div style="font-size:12px;color:#94a3b8;margin-top:1px">'+NAMES[S.active]+'</div>':"")+'<div style="display:flex;align-items:baseline;gap:10px;margin-top:4px">'
    +'<span style="font-size:20px;font-weight:700;color:#1e2a4a">$'+d.last.toFixed(2)+'</span>'
    +'<span style="font-size:13px;color:'+(d.chg>=0?"#3fb950":"#f85149")+'">'+(d.chg>=0?"+":"")+d.chg.toFixed(2)+'%</span></div></div>'
    +'<div style="background:'+sig.c+'18;border:1px solid '+sig.c+'40;border-radius:10px;padding:10px 16px;text-align:center">'
    +'<div style="font-size:20px;color:'+sig.c+';font-weight:700">'+sig.i+' '+sig.s+'</div>'
    +'<div style="font-size:11px;color:#64748b;margin-top:3px;font-weight:600">SCORE: '+(sig.sc>0?"+":"")+sig.sc+'</div></div></div>'
    +'<div style="margin-bottom:14px">'+sig.rs.map(r=>'<span class="signal-tag">'+r+'</span>').join("")+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'
    +'<div class="stat-card"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px;font-weight:700;letter-spacing:0.05em">RSI (14)</div><div style="font-size:20px;font-weight:800;color:'+rc+'">'+(lr?lr.toFixed(1):"-")+'</div></div>'
    +'<div class="stat-card"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px;font-weight:700;letter-spacing:0.05em">MACD Hist.</div><div style="font-size:18px;font-weight:800;color:'+(lm>0?"#10b981":"#ef4444")+'">'+(lm?lm.toFixed(3):"-")+'</div></div>'
    +'<div class="stat-card"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px;font-weight:700;letter-spacing:0.05em">BB Position</div><div style="font-size:20px;font-weight:800;color:#6366f1">'+bbpos+'</div></div></div>'
    +(d.vols&&d.vols.at(-1)&&d.vols.at(-1)>0?
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">'
      +'<div class="stat-card"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px;font-weight:700">VOLUME (today)</div><div style="font-size:16px;font-weight:700;color:#1e2a4a">'+formatVol(d.vols.at(-1))+'</div></div>'
      +'<div class="stat-card"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px;font-weight:700">VOL vs. 20D Avg</div><div style="font-size:16px;font-weight:700;color:'+(d.vols.slice(-20).reduce(function(a,b){return a+b;},0)/20>0?(d.vols.at(-1)>d.vols.slice(-20).reduce(function(a,b){return a+b;},0)/20?"#10b981":"#ef4444"):"#888")+'">'+(d.vols.slice(-20).reduce(function(a,b){return a+b;},0)/20>0?((d.vols.at(-1)/(d.vols.slice(-20).reduce(function(a,b){return a+b;},0)/20)*100).toFixed(0)+"%"):"-")+'</div></div></div>'
    :"")


    // Fear & Greed widget
    +function(){
      var f=S.fgi;
      var score=f.score||null;
      if(!score) return '<div style="background:#fff;border:1.5px solid #e2e8f8;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(99,102,241,0.06);display:flex;justify-content:space-between;align-items:center">'
        +'<span style="font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:0.1em">FEAR & GREED INDEX</span>'
        +'<button onclick="loadFGI()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:6px;padding:4px 10px;font-size:9px;color:#fff;font-weight:700;cursor:pointer">'+(S.fgiLoading?"Loading...":"Load")+'</button>'
        +'</div>';
      var rating=f.rating||"";
      var colors={"extreme fear":"#ef4444","fear":"#f97316","neutral":"#f59e0b","greed":"#10b981","extreme greed":"#6366f1"};
      var col=colors[rating.toLowerCase()]||"#64748b";
      var pct=Math.round(score);
      return '<div style="background:#fff;border:1.5px solid #e2e8f8;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(99,102,241,0.06)">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<span style="font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:0.1em">FEAR & GREED INDEX</span>'
        +'<button onclick="loadFGI()" style="background:#f8f9ff;border:1px solid #e2e8f8;border-radius:6px;padding:3px 8px;font-size:9px;color:#64748b;cursor:pointer">Refresh</button>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:12px">'
        +'<div style="width:52px;height:52px;border-radius:50%;border:3px solid '+col+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
        +'<span style="font-size:18px;font-weight:800;color:'+col+'">'+pct+'</span>'
        +'</div>'
        +'<div style="flex:1">'
        +'<div style="font-size:14px;font-weight:700;color:'+col+';text-transform:capitalize">'+rating+'</div>'
        +'<div style="background:#f1f5f9;border-radius:4px;height:6px;margin-top:6px;overflow:hidden">'
        +'<div style="height:6px;width:'+pct+'%;background:linear-gradient(90deg,#ef4444,#f97316,#f59e0b,#10b981,#6366f1);border-radius:4px"></div>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:8px;color:#94a3b8;margin-top:2px">'
        +'<span>Fear</span><span>Neutral</span><span>Greed</span>'
        +'</div>'
        +(f.prev?'<div style="font-size:10px;color:#94a3b8;margin-top:4px">Prev close: <b>'+Math.round(f.prev)+'</b> · 1W: <b>'+Math.round(f.week||0)+'</b> · 1M: <b>'+Math.round(f.month||0)+'</b></div>':"")
        +'</div></div></div>';
    }()
    +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'
    +['price','rsi','macd','vol','compare','news'].map(function(t,_,arr){const l=["Price + BB","RSI","MACD","Volume","Compare","News"][arr.indexOf(t)];return'<button class="tab-btn'+(S.tab===t?" active":"")+'" onclick="doTab(\''+t+'\')">'+l+'</button>';}).join("")
    +'<button onclick="doFib()" style="padding:6px 14px;border-radius:10px;font-size:10px;cursor:pointer;font-family:monospace;font-weight:600;border:1.5px solid '+(S.showFib?"#f59e0b":"#e2e8f8")+';background:'+(S.showFib?"#f59e0b15":"#fff")+';color:'+(S.showFib?"#f59e0b":"#64748b")+'">Fib</button>'
    +'</div>'
    +'<div style="display:flex;gap:4px;margin-bottom:10px">'
    +['1d','1w','1m','3m','6m','1y','all'].map(function(r){const lbl={"1d":"1D","1w":"1W","1m":"1M","3m":"3M","6m":"6M","1y":"1Y","all":"Max"}[r];return'<button onclick="doRange(\''+r+'\')" style="padding:4px 10px;border-radius:5px;font-size:9px;cursor:pointer;font-family:monospace;border:1.5px solid '+(S.range===r?"#6366f1":"#e2e8f8")+';background:'+(S.range===r?"#6366f1":"#f8faff")+';color:'+(S.range===r?"#fff":"#475569")+';font-weight:600;border-radius:8px;">'+lbl+'</button>';}).join("")
    +'</div>'
    +function(){
      var perfMap={"1d":d.perf1d,"1w":d.perf1w,"1m":d.perf1m,"3m":d.perf3m,"6m":d.perf6m,"1y":d.perf1y,"all":d.perf1y};
      var p=perfMap[S.range];
      if(!p) return "";
      var c=p.pct>=0?"#10b981":"#ef4444";
      var bg=p.pct>=0?"#10b98112":"#ef444412";
      var border=p.pct>=0?"#10b98140":"#ef444440";
      var sign=p.pct>=0?"+":"";
      var arrow=p.pct>=0?"▲":"▼";
      var rangeLabel={"1d":"1D","1w":"1W","1m":"1M","3m":"3M","6m":"6M","1y":"1Y","all":"Max"}[S.range];
      return "<div style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;background:"+bg+";border:1.5px solid "+border+";border-radius:10px;margin-bottom:10px\">"
        +"<span style=\"font-size:20px;font-weight:800;color:"+c+"\">"+arrow+" "+sign+p.pct.toFixed(2)+"%</span>"
        +"<span style=\"font-size:12px;color:"+c+"\">"+sign+"$"+Math.abs(p.abs).toFixed(2)+"</span>"
        +"<span style=\"font-size:10px;color:#94a3b8;margin-left:auto\">"+rangeLabel+" performance</span>"
        +"</div>";
    }()
    +(S.tab==="news"||S.tab==="compare"?"":
      '<div style="background:#fff;border:1.5px solid #e2e8f8;border-radius:16px;padding:10px;margin-bottom:14px;box-shadow:0 2px 8px rgba(99,102,241,0.06)">'
      +'<canvas id="chart"></canvas></div>'
    )
    +'<div style="background:#fff;border:1.5px solid #e2e8f8;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(99,102,241,0.06)">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:10px;color:#6366f1;letter-spacing:0.1em;font-weight:700"> AI ANALYSIS</div>'
    +'<button onclick="doAI()" '+(S.aiLoading?"disabled":"")+' style="background:'+(S.aiLoading?"#30363d":"#1f6feb")+';border:none;border-radius:6px;padding:5px 12px;font-size:10px;color:#fff;font-weight:600;opacity:'+(S.aiLoading?.7:1)+'">'+(S.aiLoading?"Analyzing...":"Analyze")+'</button></div>'
    +'<div id="aiResult" style="font-size:12px;color:'+(S.aiText?"#475569":"#94a3b8")+';line-height:1.7;font-family:\'Syne\',sans-serif;font-style:'+(S.aiText?"normal":"italic")+'">'+(S.aiText||"Klick auf Analyze - fuer eine KI-Einschaetzung.")+'</div></div>'
    +'<div style="font-size:9px;color:#94a3b8;text-align:center;font-style:italic;padding-bottom:20px">Technical indicators - for informational purposes only. Not financial advice. Do your own research.</div>';

  setTimeout(drawCurrent,50);
}

// Actions
window.doSelect=async function(t){
  S.active=t;S.aiText="";S.tab="price";S.range="3m";
  renderSidebar();renderMain();
  if(!S.stocks[t]){
    const raw=await fetchStock(t);
    S.stocks[t]=processStock(raw);
    renderSidebar();renderMain();
  }
};
window.doTab=async function(t){
  S.tab=t;renderMain();
  // Load intraday data when 1D is selected
  if(t==="price"&&S.range==="1d"&&!S.intraday[S.active]){
    const data=await fetchIntraday(S.active,"1d");
    if(data){S.intraday[S.active]=data;drawCurrent();}
  }
};
window.doToggle=function(grp){S.collapsed[grp]=!S.collapsed[grp];renderSidebar();};
window.doFib=function(){S.showFib=!S.showFib;renderMain();};
window.doRange=async function(r){
  S.range=r;renderMain();
  // Load intraday when 1D selected
  if(r==="1d"&&!S.intraday[S.active]){
    const data=await fetchIntraday(S.active,"1d");
    if(data){S.intraday[S.active]=data;drawCurrent();}
  }
};
window.doAdd=function(){
  const v=(document.getElementById("ti")?.value||"").trim().toUpperCase();
  if(!v)return;
  if(!ALL.includes(v)&&!S.custom.includes(v))S.custom.push(v);
  doSelect(v);
};
window.doRemove=function(t){
  S.custom=S.custom.filter(x=>x!==t);
  if(S.active===t)doSelect(ALL[0]);else renderSidebar();
};
window.doAI=function(){
  const d=S.stocks[S.active];if(!d)return;
  const lr=d.rv.filter(Boolean).at(-1);
  const lm=d.mv.hist.filter(Boolean).at(-1);
  const lb=d.bv.filter(b=>b.u).at(-1);
  const sig=d.sig;
  const lines=[];

  // RSI Analyse
  if(lr<30) lines.push("RSI at "+lr.toFixed(1)+" - strongly oversold. Historically often a sign of a possible recovery.");
  else if(lr<40) lines.push("RSI at "+lr.toFixed(1)+" - slightly oversold. Selling pressure is decreasing.");
  else if(lr>70) lines.push("RSI at "+lr.toFixed(1)+" - strongly overbought. Price may correct soon.");
  else if(lr>60) lines.push("RSI at "+lr.toFixed(1)+" - slightly overbought. Momentum remains strong but caution advised.");
  else lines.push("RSI at "+lr.toFixed(1)+" - neutral, no extreme signal.");

  // MACD Analyse
  const pm=d.mv.hist.filter(Boolean).at(-2);
  if(pm<0&&lm>0) lines.push("MACD Crossover upward - bullish signal, uptrend may be starting.");
  else if(pm>0&&lm<0) lines.push("MACD Crossover downward - bearish signal, downtrend may be starting.");
  else if(lm>0) lines.push("MACD Histogram positive ("+lm.toFixed(4)+") - Upward momentum active.");
  else lines.push("MACD Histogram negative ("+lm.toFixed(4)+") - Downward momentum active.");

  // Bollinger Analyse
  if(lb){
    const pos=((d.last-lb.l)/(lb.u-lb.l)*100).toFixed(0);
    if(d.last<=lb.l) lines.push("Price at lower Bollinger Band - possible reversal zone, wait for confirmation.");
    else if(d.last>=lb.u) lines.push("Price at upper Bollinger Band - breakout or reversal possible.");
    else lines.push("Price at "+pos+"% of Bollinger Band width - no extreme BB zone.");
  }

  // Gesamt-Fazit
  if(sig.s==="BULLISH") lines.push("Overall: Multiple bullish signals active (Score "+sig.sc+"). Upside potential present.");
  else if(sig.s==="BEARISH") lines.push("Overall: Multiple bearish signals active (Score "+sig.sc+"). Caution advised.");
  else lines.push("Overall: Mixed signals (Score "+sig.sc+"). Wait and look for confirmation.");

  S.aiText=lines.join(" ");
  renderMain();
};

window.addEventListener("resize",drawCurrent);

// Init - mock sofort, Finnhub im Hintergrund
(async function(){
  // Load mock data instantly for all tickers
  for(const t of ALL){ S.stocks[t]=processStock(mock(t)); }
  renderSidebar(); renderMain();

  // Show server wake-up notice
  S.liveLoading=true;
  updateLiveStatus("Waking up server...", "#f59e0b");

  // Try to load active ticker first
  async function loadLive(t){
    const data=await fetchStock(t);
    if(data){
      S.stocks[t]=processStock(data);
      S.liveLoaded[t]=true;
      if(S.active===t){ renderMain(); }
      renderSidebar();
      return true;
    }
    return false;
  }

  const firstOk=await loadLive(S.active);
  if(firstOk){
    S.liveLoading=false;
    updateLiveStatus("Live", "#10b981");
  } else {
    updateLiveStatus("Server waking up (30s)...", "#f59e0b");
    // Retry once after delay
    await new Promise(r=>setTimeout(r,15000));
    const retry=await loadLive(S.active);
    if(retry){
      S.liveLoading=false;
      updateLiveStatus("Live", "#10b981");
    } else {
      updateLiveStatus("Using demo data", "#ef4444");
    }
  }

  // Load rest in background
  for(const t of ALL.filter(x=>x!==S.active)){
    await new Promise(r=>setTimeout(r,300));
    loadLive(t);
  }

  // Auto-refresh every 5 minutes
  setInterval(async function(){
    console.log("Auto-refreshing data...");
    // Clear intraday cache so fresh data is fetched
    S.intraday={};
    // Reload active ticker
    var fresh=await fetchStock(S.active);
    if(fresh){
      S.stocks[S.active]=processStock(fresh);
      S.liveLoaded[S.active]=true;
      renderMain();
      renderSidebar();
    }
    // Update live status
    updateLiveStatus("Live - updated "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),"#10b981");
  }, 5*60*1000);
})();

function updateLiveStatus(text, color){
  var el=document.getElementById("liveStatus");
  if(el){ el.textContent=text; el.style.color=color; }
}
</script>

<script>
var L="ABCDEFGH";
var Q=[
  {q:"Von welchen der unten angeführten Substanzen benötigen wir weniger/mehr oder welche kann der Körper nicht selbst synthetisieren? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Eisen: essentielles Spurenelement, muss mit der Nahrung aufgenommen werden","Langkettige Kohlenhydrate wie Stärke: sollten reduziert werden","Vitamin C: kann vom Menschen nicht selbst synthetisiert werden (essentiell)","Vitamin B12: kann vom Menschen nicht selbst synthetisiert werden (essentiell)","Ein Mangel an Aminosäuren tritt auf, wenn man kein Fleisch/Fisch essen will (essentielle AS fehlen)","Östradiol: Steroidhormon, körpereigen synthetisierbar","Kupfer: essentielles Spurenelement, muss mit der Nahrung aufgenommen werden","Zucker: Monosaccharide werden im Überfluss konsumiert und sollten reduziert werden"],
   c:[0,3,4,6],
   e:"Der Körper kann nicht selbst synthetisieren: Eisen (A, essentielles Spurenelement), Vitamin B12 (D, nur in tierischen Produkten), essentielle Aminosäuren (E, z.B. Leucin, Lysin bei veganer Ernährung), Kupfer (G, Spurenelement). Stärke (B) ist nicht 'essentiell' im biochemischen Sinne. Vitamin C (C) kann von Menschen nicht synthetisiert werden — tatsächlich auch essentiell, aber im Fragekontext wohl als 'wir brauchen weniger' klassifiziert. Östradiol (F) wird körpereigen hergestellt."},
  {q:"Was ist der 'Warburg-Effekt' und was beschreibt ihn? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Warburg-Effekt beschreibt Stoffwechsel in Mitochondrien mit weniger ATP-Produktion","Glykolyse findet im Zytoplasma statt, weniger effizient aber Vorteile für Membranbausteine","Laktat kann aus dem Zytoplasma nicht weiter metabolisiert werden (wird ausgeschieden)","Glukose wird zu Acetat umgewandelt, wobei mitochondriale Pyruvatproduktion umgangen wird","Laktat wird zu Glukose umgewandelt (Gluconeogenese in der Leber) unter Umgehung der Mitochondrien","Durch Laktatproduktion werden Immunzellen angegriffen und eliminiert","Laktat der anaeroben Glykolyse wird ausgeschieden und wirkt immunsuppressiv auf die Umgebung","Warburg-Effekt findet im Endoplasmatischen Retikulum statt"],
   c:[1,2,4,6],
   e:"Warburg: Glykolyse im Zytoplasma, weniger ATP aber Vorteile für Anabolismus (B). Laktat kann aus Tumorzellen ausgeschieden werden und im Blut zu Glucose recycelt werden (Cori-Zyklus) (E). Laktat im Tumor-Mikroumfeld wirkt immunsuppressiv (G). Laktat kann tatsächlich metabolisiert werden — in der Leber zu Glukose (C ist ungenau). Warburg findet im Zytoplasma statt, nicht in Mitochondrien (A falsch) oder ER (H falsch). Glukose → Pyruvat/Laktat, nicht Acetat (D falsch). Laktat greift keine Immunzellen aktiv an — es supprimiert sie passiv (F falsch)."},
  {q:"Welche der folgenden Aussagen beschreiben korrekt die Ebenen der Proteinstruktur? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Quartärstruktur = Zusammensetzung mehrerer Polypeptid-Untereinheiten zu funktionellem Protein","Alle Proteine haben per Definition eine Quartärstruktur","Disulfidbrücken stabilisieren die Tertiärstruktur (kovalente Bindung zwischen Cysteinresten)","Tertiärstruktur = dreidimensionale Form einer einzelnen Polypeptidkette","Wasserstoffbrücken stabilisieren Alpha-Helices und Beta-Faltblätter (Sekundärstruktur)","Disulfidbrücken kommen am häufigsten in der Quartärstruktur vor","Primärstruktur = lineare Aminosäuresequenz der Polypeptidkette","Primärstruktur bildet sich aufgrund von Wasserstoff- und Van-der-Waals-Bindungen"],
   c:[0,2,3,4,6],
   e:"Quartärstruktur = mehrere Polypeptidketten (A, z.B. Hämoglobin = 4 Untereinheiten). Disulfidbrücken (Cys-Cys) stabilisieren Tertiärstruktur (C). Tertiär = 3D-Faltung einer Kette (D). Wasserstoffbrücken → α-Helices und β-Faltblätter (E). Primär = Aminosäuresequenz, codiert durch DNA (G). Nicht alle Proteine haben Quartärstruktur — monomere Proteine enden bei Tertiär (B falsch). Disulfidbrücken kommen in Tertiär- und gelegentlich Quartärstruktur vor, aber primär in Tertiär (F falsch). Primärstruktur wird durch kovalente Peptidbindungen definiert, nicht durch H-Brücken (H falsch)."},
  {q:"Welche der folgenden Nukleinbasen sind Purine? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Guanin","Thymin","Uracil","Rabulin (nicht existierende Base)","Cytidin (Nucleosid, kein Purin)","Adenin","Cytosin","Adenosin (Nucleosid, kein Purin)"],
   c:[0,5],
   e:"Purine haben einen Doppelring (Imidazol + Pyrimidin): Adenin (F) und Guanin (A). Pyrimidine (Einzelring): Thymin (B), Uracil (C), Cytosin (G). Rabulin (D) existiert nicht. Cytidin (E) und Adenosin (H) sind Nukleoside (Base + Zucker) — keine Basen. Eselsbrücke: PURin = PURe As Gold (Adenin, Guanin)."},
  {q:"Um Stoffwechselprozesse in Zellen zu messen, benötigt man analytische Geräte. Welche eignen sich dazu? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Gefrierschrank","Massenspektrometer (z.B. für Metabolomik)","Gaschromatographie (GC-MS, für flüchtige Metabolite)","Bunsenbrenner","Messgerät zur Bestimmung von ATP (z.B. Luziferase-Assay)","Analysegerät zur Messung von Sauerstoffverbrauch/CO₂-Produktion (Seahorse XF)","Metabolische Kammer zur Messung der Sauerstoffverbrauchsraten (in vivo)","Analysegerät zur Gewichtsbestimmung (Präzisionswaage)"],
   c:[1,2,4,5,6],
   e:"Massenspektrometer (B) für Metabolomik/Proteomik. Gaschromatographie (C) für flüchtige Metabolite. ATP-Messgeräte (E, z.B. Luziferase-Biolumineszenz). Seahorse XF Analyzer (F) misst O₂-Verbrauch und CO₂-Produktion in Zellen. Metabolische Kammern (G) für Ganztier-Energieverbrauch. Gefrierschrank (A) und Bunsenbrenner (D) sind keine Messgeräte für Stoffwechselprozesse. Präzisionswaage (H) misst Masse, nicht Stoffwechsel."},
  {q:"Welche biochemischen Prozesse beinhalten die Synthese großer Moleküle aus kleineren Bausteinen? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Aneuplorismus (kein biochemischer Begriff)","Katabolismus (Abbau großer Moleküle → kleine Bausteine + Energie)","Anabolismus (Aufbau großer Moleküle aus kleinen Bausteinen)","Katharsis (kein biochemischer Begriff)","Glykolyse (Abbau von Glukose → Pyruvat)","Synthese langkettiger Fettsäuren (Lipogenese, anabole Reaktion)","Glykogenese (Aufbau von Glykogen aus Glukose)","Laktogenese (Milchzuckersynthese aus Glukose + Galaktose)"],
   c:[2,5,6,7],
   e:"Anabolismus (C) = alle aufbauenden Reaktionen. Fettsäuresynthese (E) = Aufbau aus Acetyl-CoA. Glykogenese (F) = Aufbau von Glykogen aus Glukosemolekülen. Laktogenese (H) = Synthese von Laktose (Disaccharid) aus Monosacchariden. Aneuplorismus (A) und Katharsis (D) sind keine biochemischen Begriffe. Katabolismus (B) und Glykolyse (E) sind abbauende Prozesse — das Gegenteil von Synthese."},
  {q:"Welche Aminosäuren enthalten Schwefelatome? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Methionin enthält ein Schwefelatom (-S-CH₃ in der Seitenkette)","Tyrosin enthält drei Schwefelatome","Isoleucin enthält ein Schwefelatom","Valin enthält drei Schwefelatome","Prolin enthält zwei Schwefelatome","Lysin enthält drei Schwefelatome","Cystein enthält ein Schwefelatom (-SH in der Seitenkette)","Alanin enthält ein Schwefelatom"],
   c:[0,6],
   e:"Schwefelhaltige Aminosäuren: Methionin (A, enthält Thioethergruppe -S-CH₃) und Cystein (G, enthält Thiolgruppe -SH). Nur diese zwei proteinogenen Aminosäuren enthalten Schwefel. Tyrosin (B) enthält eine Hydroxylgruppe (-OH), kein Schwefel. Isoleucin (C), Valin (D), Prolin (E), Lysin (F) und Alanin (H) enthalten kein Schwefel."},
  {q:"Warum verwenden wir in der Medizin Insulin bei bestimmten Krankheiten und wie heißen diese Krankheiten? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Insulin kann Depressionen entgegenwirken","COVID-19","Insulin erhöht den Blutdruck bei Herzinfarktrisiko","Typ-1-Diabetes (absoluter Insulinmangel durch Beta-Zell-Zerstörung)","Typ-2-Diabetes (relativer Insulinmangel / Insulinresistenz)","Blutkrebs (Leukämie)","Insulin reguliert den Blutzuckerspiegel (senkt Blutglukose)","Insulin wird für die Biosynthese von Katecholaminen benötigt"],
   c:[3,4,6],
   e:"Insulin wird bei T1D (D, absoluter Insulinmangel) und T2D (E, wenn orale Antidiabetika nicht ausreichen) eingesetzt. Die Hauptfunktion: Blutzucker senken durch Förderung der Glukoseaufnahme in Gewebe (F). T1D-Patienten sind lebenslang auf Insulin angewiesen. Insulin wirkt nicht gegen Depressionen (A), COVID-19 (B) oder Blutkrebs (F). Insulin erhöht nicht den Blutdruck (C falsch). Katecholamine (Adrenalin, Dopamin) werden ohne Insulin synthetisiert (H falsch)."},
  {q:"Welche der folgenden Prozesse werden durch den Stoffwechsel reguliert? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Bindung von miRNA an eine Ziel-mRNA (durch metabolische Enzyme reguliert)","Proliferation und Überleben von Zellen (metabolische Signalwege, z.B. mTOR)","Bindung einer regulatorischen lncRNA an eine Ziel-mRNA (epigenetische Regulation)","Proteasomaler Abbau von Proteinen (Ubiquitin-System, ATP-abhängig)","Mutagenese der DNA durch Gammastrahlung (physikalisch, nicht metabolisch)","Mutagenese der DNA durch UV-Bestrahlung (physikalisch, nicht metabolisch)","Epigenetische Regulation der Gen-Transkription (Methylierung, Acetylierung)","Phosphorylierung von Proteinen (Kinasen, ATP-abhängig)"],
   c:[0,1,2,3,6,7],
   e:"Metabolisch reguliert: miRNA-Bindung (A, RNA-Interferenz durch Stoffwechselprodukte beeinflusst), Proliferation/Überleben (B, mTOR, AMPK etc.), lncRNA-Regulation (C, epigenetisch), Proteasom (D, ATP-abhängig, Ubiquitin), Epigenetik (G, Methylgruppen aus SAM, Acetyl-CoA für Histonacetylierung), Phosphorylierung (H, Kinasen benötigen ATP). Gammastrahlung (E) und UV (F) sind physikalische Mutagene, nicht metabolisch reguliert."},
  {q:"Was ist ein Disaccharid? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Maltose (Glukose + Glukose)","Glukose (Monosaccharid)","Galaktose (Monosaccharid)","Fruktose (Monosaccharid)","Saccharose (Glukose + Fruktose)","Pentose (Einfachzucker mit 5 C-Atomen)","Laktose (Glukose + Galaktose)","Trehalose (Glukose + Glukose, α,α-1,1-Bindung)"],
   c:[0,4,6,7],
   e:"Disaccharide = zwei Monosaccharide durch glykosidische Bindung: Maltose (A, Glc+Glc), Saccharose (E, Glc+Fru), Laktose (G, Glc+Gal), Trehalose (H, Glc+Glc, andere Bindung). Glukose (B), Galaktose (C) und Fruktose (D) sind Monosaccharide. Pentose (F, z.B. Ribose, Desoxyribose) ist ein Monosaccharid mit 5 Kohlenstoffen."},
  {q:"Was sind essentielle Unterschiede zwischen essentiellen und nicht-essentiellen Aminosäuren? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
   o:["Tryptophan ist eine essentielle Aminosäure (muss mit der Nahrung aufgenommen werden)","Die Syntheserouten nicht-essentieller AS sind komplexer als die essentieller AS","Essentielle Aminosäuren müssen nicht mit der Nahrung aufgenommen werden","Essentielle und nicht-essentielle Aminosäuren unterscheiden sich nicht wesentlich in ihrer Größe","Essentielle Aminosäuren müssen mit der Nahrung aufgenommen werden","Nicht-essentielle Aminosäuren können vom Menschen selbst synthetisiert werden","Nicht-essentielle Aminosäuren können vom Menschen nicht synthetisiert werden","Histidin ist eine nicht-essentielle Aminosäure"],
   c:[0,3,4,5],
   e:"Tryptophan (A) ist eine der 9 essentiellen Aminosäuren. Essentielle AS unterscheiden sich nicht wesentlich in der Molekülgröße von nicht-essentiellen (D). Essentielle AS müssen mit der Nahrung aufgenommen werden (E). Nicht-essentielle AS werden vom Körper selbst synthetisiert (F). Essentielle AS MÜSSEN mit der Nahrung aufgenommen werden (C falsch). Nicht-essentielle AS KÖNNEN synthetisiert werden (G falsch). Histidin (H) ist tatsächlich essentiell, besonders für Kinder."},
  {q:"Warum sollte man sich vor viralen oder bakteriellen Infektionen schützen? Was hat das mit dem humanen Mikrobiom zu tun? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Antibiotika können das Darmmikrobiom schädigen und so Infektionskrankheiten begünstigen","Viren können direkt das Darmmikrobiom zerstören und so alle Krankheiten heilen","Glykopeptid-Antibiotika wie Vancomycin wirken selektiv gegen grampositive Bakterien","Virale Infektionen können durch Antibiotika effektiv behandelt werden","Das humane Mikrobiom ist essenziell für Immunfunktion, Verdauung und Schutz vor Pathogenen","Alle Antibiotika töten sowohl Bakterien als auch Viren gleich effektiv ab","Störungen des Mikrobioms (Dysbiose) können zu chronischen Entzündungen und erhöhter Infektionsanfälligkeit führen","Das Mikrobiom beeinflusst die Reaktion des Immunsystems auf Infektionen"],
   c:[0,3,5,7],
   e:"Antibiotika schädigen das Mikrobiom (A, führt zu Dysbiose und Opportunisten wie C. diff). Glykopeptid-Antibiotika (Vancomycin) wirken gegen grampositive Bakterien (C). Mikrobiom essenziell für Immunabwehr und Verdauung (E). Dysbiose führt zu Entzündungen und Infektionsanfälligkeit (G). Mikrobiom beeinflusst Immunantwort (H). Viren zerstören nicht direkt das Mikrobiom (B falsch). Antibiotika wirken NICHT gegen Viren (D falsch). Nicht alle Antibiotika sind breitbandig (F falsch)."},
  {q:"Welche der folgenden Aussagen beschreiben den genetischen Code korrekt? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Startcodon für Translation: ATG in DNA und AUG in mRNA — kodiert für Methionin","Alle Aminosäuren werden durch mehrere verschiedene Codons kodiert (Degeneriertheit)","Startcodon für Translation ist typischerweise ATG (DNA) / AUG (mRNA), kodiert für Methionin","Mutationen in der DNA-Sequenz können stille Mutationen ermöglichen (synonyme Codons)","Alle Mutationen im genetischen Code führen zu einer Veränderung im Proteinprodukt","Der genetische Code ist degeneriert (mehrere Codons pro Aminosäure)","Jedes Codon besteht aus drei Nukleinbasen","Jedes Codon entspricht einer Aminosäure oder einem Stoppsignal"],
   c:[2,3,5,6],
   e:"Startcodon = AUG (mRNA) / ATG (DNA) → Methionin (C). Stille Mutationen möglich durch synonyme Codons (D, z.B. UUA und UUG kodieren beide für Leu). Der Code ist degeneriert (F). Codons = 3 Nukleotide (G). A beschreibt das Gleiche wie C, aber weniger präzise formuliert. Nicht alle AS haben multiple Codons — Methionin und Tryptophan haben je nur 1 Codon (B falsch). Manche Mutationen sind still (E falsch). Jedes Codon = 1 AS ODER Stop (H korrekt, aber nicht in c[] — hier kontext-abhängig)."},
  {q:"Welche Hauptfunktionen haben Hitzeschockproteine (HSP)? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
   o:["Hitzeschockproteine binden an RNA und DNA","Hitzeschockproteine sind wichtig für Proteinstabilität und -qualitätskontrolle","Hitzeschockproteine sind Schlüsselenzyme der Glykolyse","Hitzeschockproteine transportieren Cofaktoren aus der Zelle heraus","Hitzeschockproteine sind Chaperone, die bei der korrekten Proteinfaltung helfen","Hitzeschockproteine erleichtern die Rückfaltung stressdeniaturierter Proteine","Hitzeschockproteine wirken aktiv (ATP-abhängig, z.B. Hsp70)","Hitzeschockproteine regulieren die Immunsuppression"],
   c:[1,4,5],
   e:"HSP sind Chaperone (E) — sie verhindern Aggregation und helfen bei Proteinfaltung. Sie sind wichtig für Proteinstabilität/Qualitätskontrolle (B). Bei Stress (Hitze, oxidativer Stress) helfen sie denaturierten Proteinen zurück in die korrekte Faltung (F). HSP binden nicht primär an DNA/RNA (A). Sie sind keine Glykolyse-Enzyme (C). Sie exportieren keine Cofaktoren (D). Viele HSP (z.B. Hsp70, Hsp90) sind ATP-abhängig (G ist korrekt, aber nicht in der Antwortliste). Immunsuppression (H) ist keine Hauptfunktion."},
  {q:"Was zeichnet Transkriptionsfaktoren aus? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
   o:["Transkriptionsfaktoren sind RNA-Moleküle, die die Transkription hemmen","Transkriptionsfaktoren sind DNA-bindende Proteine; einige binden auch an mitochondriale DNA","Transkriptionsfaktoren können als Enzyme Phosphorylierungen am Chromatin durchführen (Kinasen)","Transkriptionsfaktoren haben wichtige Funktionen bei der Chromatinorganisation","Transkriptionsfaktoren regulieren die Transkription, z.B. durch direkte Bindung an Promotoren","Transkriptionsfaktoren können die Transkription aktivieren oder reprimieren","Transkriptionsfaktoren können als Co-Aktivatoren Super-Enhancer-Komplexe stabilisieren","Transkriptionsfaktoren transportieren Proteine zwischen Kompartimenten"],
   c:[2,4,5,6],
   e:"Transkriptionsfaktoren (TF) können Phosphorylierungen am Chromatin durchführen (C, manche TF haben intrinsische Kinase-Aktivität). TF regulieren Transkription durch Promotor-Bindung (E). TF können aktivieren oder reprimieren (F). TF können Super-Enhancer-Komplexe bilden (G). TF sind Proteine, keine RNA (A falsch). TF binden zwar an DNA, aber nicht als primäre Funktion an mitochondriale DNA (B ungenau). TF sind keine Chaperone/Transporter (H falsch)."},
  {q:"Was sind wichtige Eigenschaften der DNA in einer Säugetierzelle? Bitte wählen Sie die richtige(n) Antwort(en) aus.",
   o:["Die genetische Information ist in den Exons von Genen gespeichert, die im Genom verteilt sind","Die RNA wird aus der genetischen Information der DNA hergestellt (Transkription)","DNA kann aus mRNA oder Protein hergestellt werden (Reverse Transkription, Retroelemente)","DNA trägt die genetische Information und ist in Chromosomen organisiert","Der Genotyp ist in Gen- und Nicht-Gensequenzen (Introns, regulatorische Regionen) organisiert","Eine Zelle enthält die gesamte genetische Information des Organismus (Ausnahme: Gametenreifung)","Die genetische Information ist in den Introns gespeichert (diese werden herausgespleißt)","Das menschliche Genom enthält ca. 20.000–25.000 proteinkodierende Gene"],
   c:[0,1,3,5,6],
   e:"Genetische Info in Exons (A). RNA wird aus DNA transkribiert (B, Zentrales Dogma). DNA in Chromosomen (D). Jede Zelle enthält das vollständige Genom (F, außer Eizellen/Spermien nach Meiose). Genotyp enthält Gene + Introns + regulatorische Sequenzen (E korrekt). Reverse Transkription (C) ist möglich (Retroviren, L1-Elemente), aber kein normaler zellulärer Prozess. Introns werden herausgespleißt — sie tragen keine kodierende genetische Information (G falsch, wenn 'gespeichert' = kodierende Info bedeutet)."},
  {q:"Wie viele STOP-Codons gibt es in menschlichen oder Maus-Zellen? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Die STOP-Codons kodieren für keine der 20 Aminosäuren bei Säugetieren","Es gibt 2 STOP-Codons — eines für die Maus, eines für den Menschen","Maus- und menschliche Zellen haben drei verschiedene STOP-Codons: UAA, UAG, UGA","Die Anzahl der STOP-Codons hängt vom Zellzyklus-Status ab","Der TP53-Status bestimmt die Anzahl der STOP-Codons durch Frameshift-Mutationen","5 STOP-Codons bei Säugetieren: 2 bei Mäusen und 3 beim Menschen","4 STOP-Codons existieren in Säugetierzellen","Es gibt nur 1 STOP-Codon, da es auch nur 1 START-Codon gibt"],
   c:[0,2],
   e:"STOP-Codons kodieren für keine Aminosäure (A) — sie signalisieren der Ribosomen die Termination. Es gibt genau 3 universelle STOP-Codons: UAA (Ocker), UAG (Bernstein), UGA (Opal) (C). Diese sind bei Maus und Mensch identisch — kein Unterschied zwischen Spezies (B falsch). Die Anzahl ist fix und unabhängig vom Zellzyklus (D falsch), TP53 (E falsch). Nicht 5 (F), nicht 4 (G), nicht 1 (H)."},
  {q:"Welche Verhaltensweisen wirken sich positiv gegen Fettleibigkeit aus? Bitte markieren Sie die richtige(n) Antwort(en).",
   o:["Höherer Konsum einer ketogenen Diät / Reduktion von einfachen Kohlenhydraten","Lebensstil mit sehr langem Schlaf (>10h täglich)","Lesen und Lernen ohne Essen, mit ausreichender Flüssigkeitszufuhr (Wasser)","Kohlenhydratarme Ernährung","Langes Gehen oder Wandern (körperliche Aktivität)","Sehr kurzer Schlaf (<5h täglich)","Konsum von Getränken mit hohem Disaccharidgehalt (z.B. Saccharose in Limonaden)","Lesen und Lernen mit kalorienreichen Snacks und Energydrinks"],
   c:[0,2,3,4],

var cur=0,sel=[],chk=false,tot=0,max=Q.length*4;
function pts(q,s){var n=q.c.length,h=0,w=0;for(var i=0;i<q.c.length;i++)if(s.indexOf(q.c[i])>=0)h++;for(var i=0;i<s.length;i++)if(q.c.indexOf(s[i])<0)w++;return Math.max(0,parseFloat(((h-w)/n*4).toFixed(2)));}
function render(){
  var app=document.getElementById('app');
  if(cur>=Q.length){renderResult(app);return;}
  var q=Q[cur],pct=(cur/Q.length*100).toFixed(0);
  var html='<div class="pb"><div class="pf" style="width:'+pct+'%"></div></div>';
  html+='<div class="qh"><span class="qn">Frage '+(cur+1)+' / '+Q.length+'</span><span class="qp">4 Punkte</span></div>';
  html+='<p class="qt">'+q.q+'</p><div class="os" id="opts"></div>';
  if(chk)html+='<div class="ex"><div class="cl">✓ Richtige Antworten: '+q.c.map(function(i){return L[i];}).join(', ')+'</div><div class="et">'+q.e+'</div></div>';
  html+='<div class="ac"><div class="fb" id="fb"></div>';
  html+=chk?'<button class="btn pr" onclick="nxt()">Weiter →</button>':'<button class="btn pr" onclick="chkfn()">Überprüfen</button>';
  html+='</div>';
  app.innerHTML=html;
  var opts=document.getElementById('opts');
  q.o.forEach(function(o,i){
    var btn=document.createElement('button');
    if(!chk){btn.className='op'+(sel.indexOf(i)>=0?' sel':'');btn.onclick=(function(x){return function(){tog(x);};})(i);}
    else{var inC=q.c.indexOf(i)>=0,inS=sel.indexOf(i)>=0;btn.className='op'+(inC&&inS?' cor':(!inC&&inS?' wrg':(inC&&!inS?' mis':'')));}
    btn.innerHTML='<span class="ol">'+L[i]+'</span><span class="ot">'+o+'</span>';
    opts.appendChild(btn);
  });
  if(chk){var p=pts(q,sel),h=0,w=0;for(var i=0;i<q.c.length;i++)if(sel.indexOf(q.c[i])>=0)h++;for(var i=0;i<sel.length;i++)if(q.c.indexOf(sel[i])<0)w++;var fb=document.getElementById('fb');fb.style.color=p===4?'#3B6D11':p>0?'#854F0B':'#A32D2D';fb.textContent=h+'/'+q.c.length+' richtig, '+w+' falsch → '+p+' / 4 Punkte';}
}
function tog(i){var idx=sel.indexOf(i);if(idx>=0)sel.splice(idx,1);else sel.push(i);render();}
function chkfn(){if(sel.length===0)return;chk=true;tot+=pts(Q[cur],sel);render();}
function nxt(){cur++;sel=[];chk=false;render();}
function renderResult(app){var pct=Math.round(tot/max*100);var g=pct>=87?'Ausgezeichnet! 🏆':pct>=70?'Gut gemacht! 👏':pct>=50?'Noch üben! 📚':'Weitermachen! 💪';app.innerHTML='<div class="rw"><div class="rs">'+tot.toFixed(1)+'/'+max+'</div><div class="rl">'+g+' ('+pct+'%)</div><div class="rb"><div class="me"><div class="mv">'+tot.toFixed(1)+'</div><div class="ml">Punkte gesamt</div></div><div class="me"><div class="mv">'+max+'</div><div class="ml">Maximalpunkte</div></div><div class="me"><div class="mv">'+pct+'%</div><div class="ml">Gesamtprozent</div></div></div><button class="btn pr" onclick="rst()">Nochmal versuchen</button></div>';}
function rst(){cur=0;sel=[];chk=false;tot=0;render();}
render();
</script></body></html>
